<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Bertugas SK Simpang Empat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (Vanilla) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Layout untuk Kertas A4 Preview */
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            padding: 15mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            color: black;
        }

        @media print { 
            @page { margin: 10mm; size: A4 portrait; } 
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
            
            /* Sembunyikan elemen yang tidak perlu dicetak */
            .print-hidden { display: none !important; } 
            
            /* Buang shadow dan background semasa print untuk jimat dakwat jika perlu, 
               tapi kita kekalkan struktur a4-paper */
            .a4-paper { 
                width: 100%; 
                min-height: auto; 
                padding: 0; 
                box-shadow: none; 
                margin: 0; 
            }
            
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
        }
    </style>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- KONFIGURASI LOCAL STORAGE ---
        const LOCAL_STORAGE_KEY = "skse_laporan_data";

        // --- ICONS SETUP ---
        const IconWrapper = ({ name, className, ...props }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                className: className, ...props,
                dangerouslySetInnerHTML: { __html: iconData.map(child => {
                    const [tag, attrs] = child;
                    const attrString = Object.entries(attrs).map(([key, val]) => `${key}="${val}"`).join(' ');
                    return `<${tag} ${attrString}></${tag}>`;
                }).join('') }
            });
        };
        const createIcon = (name) => (props) => <IconWrapper name={name} {...props} />;
        
        // Icons List
        const ClipboardList = createIcon('ClipboardList'); const Users = createIcon('Users');
        const Utensils = createIcon('Utensils'); const School = createIcon('School');
        const UserCheck = createIcon('UserCheck'); const LogOut = createIcon('LogOut');
        const Printer = createIcon('Printer'); const CheckCircle = createIcon('CheckCircle');
        const Calendar = createIcon('Calendar'); const BarChart3 = createIcon('BarChart3');
        const FileText = createIcon('FileText'); const UserCog = createIcon('UserCog');
        const AlertTriangle = createIcon('AlertTriangle'); const Save = createIcon('Save');
        const AlertCircle = createIcon('AlertCircle'); const CalendarDays = createIcon('CalendarDays'); 
        const ChevronLeft = createIcon('ChevronLeft'); const ChevronRight = createIcon('ChevronRight'); 
        const ShieldCheck = createIcon('ShieldCheck'); const MapPin = createIcon('MapPin');
        const Trash2 = createIcon('Trash2'); const Activity = createIcon('Activity');
        const Check = createIcon('Check'); const GraduationCap = createIcon('GraduationCap');
        const X = createIcon('X'); const Shield = createIcon('Shield'); const Key = createIcon('Key');
        const Database = createIcon('Database'); const Download = createIcon('Download');
        const FileEdit = createIcon('FileEdit'); const Lock = createIcon('Lock');

        // --- DATA PEMALAR ---
        const CLASSES = ['PRA CEMERLANG', 'PRA GEMILANG', '1 SETIA', '1 IKHLAS', '2 MAJU', '2 PERKASA', '3 NAIM', '3 AKTIF', '4 GIGIH', '4 EHSAN', '5 MAHIR', '5 PINTAR', '6 ARIF', '6 TEKUN', 'PPKI ADN', 'PPKI FIRDAUS', 'PPKI MAWA', 'PPKI RAYYAN'];
        const MONTHS = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];

        // SENARAI NAMA PENTADBIR (Default - Akan ditindih oleh Google Sheets jika URL diletakkan)
        const SENARAI_PENTADBIR_ASAL = [
            "EN. AHMAD BIN ALI (GURU BESAR)", "PN. SITI BINTI ABU (PK PENTADBIRAN)", "EN. RAMLI BIN SAAD (PK HEM)",
            "PN. FATIMAH BINTI OMAR (PK KOKURIKULUM)", "EN. YUSOF BIN ISHAK (PK PPKI)"
        ];

        // SENARAI NAMA GURU (Default - Akan ditindih oleh Google Sheets jika URL diletakkan)
        const SENARAI_GURU_ASAL = [
            "CIK NURUL AIN BINTI HASSAN", "EN. MOHD FAIZAL BIN IBRAHIM", "PN. ROSLINA BINTI MAHMUD",
            "EN. KHAIRUL ANUAR BIN ZAINAL", "PN. AZIZAH BINTI ABDULLAH", "CIK FARAH NADIA BINTI OTHMAN",
            "EN. SYED SYAHMI BIN SYED OMAR", "PN. NORHAYATI BINTI SALIM", "EN. ZAMRI BIN YAHYA",
            "PN. HALIMAH BINTI KASSIM", "EN. AMIRUL MUKMININ BIN RASHID", "PN. ZURAIDAH BINTI MANSOR",
            "CIK INTAN SYAFINAZ BINTI AZMI", "EN. ROSLI BIN BAKAR", "PN. MARDIANA BINTI JUSOH",
            "EN. ABU BAKAR BIN OMAR", "PN. KALSOM BINTI MAJID", "EN. MUHAMMAD BIN HARUN"
        ];

        const getTodayLocal = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // --- KOMPONEN UI ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl border-2 border-white/50 p-6 transition-all hover:shadow-2xl ${className} print-hidden`}>{children}</div>
        );

        const SectionTitle = ({ icon: Icon, title, colorClass = "text-purple-600" }) => (
            <h3 className={`flex items-center text-lg font-bold mb-4 print-text-black border-b-2 border-dashed border-gray-200 pb-2 ${colorClass}`}>
                <Icon className={`w-6 h-6 mr-2 ${colorClass}`} /> {title}
            </h3>
        );

        const NavButton = ({ active, onClick, icon: Icon, label }) => (
            <button onClick={onClick} className={`flex-1 flex items-center justify-center px-4 py-3 rounded-2xl font-bold transition-all transform ${active ? 'bg-white text-purple-700 shadow-lg scale-105 ring-4 ring-purple-200' : 'bg-white/20 text-white hover:bg-white/30 hover:scale-105'}`}>
                <Icon className="w-5 h-5 mr-2" /> {label}
            </button>
        );

        const StatCard = ({ title, value, subtext, icon: Icon, colorClass, children }) => (
            <Card className="flex flex-col justify-between h-full border-t-4 border-t-current" style={{ borderColor: colorClass.includes('text-') ? undefined : '' }}>
                <div className={`flex justify-between items-start mb-2 ${colorClass.includes('border') ? '' : 'border-t-0'}`} style={{ borderColor: 'inherit' }}>
                    <div><p className="text-xs font-bold uppercase tracking-wider text-gray-400">{title}</p><h4 className={`text-4xl font-black mt-2 ${colorClass}`}>{value}</h4>{subtext && <span className="text-xs font-medium text-gray-400">{subtext}</span>}</div>
                    <div className={`p-3 rounded-2xl bg-gray-50 ${colorClass.replace('text-', 'bg-').replace('600', '100').replace('500', '100')}`}><Icon className="w-6 h-6" /></div>
                </div>
                {children}
            </Card>
        );

        const SimpleBarChart = ({ data, labels, color = "bg-purple-400" }) => {
            const safeData = Array.isArray(data) ? data : [0, 0, 0, 0, 0];
            const max = Math.max(...safeData, 1);
            return (
                <div className="flex items-end space-x-3 h-24 w-full pt-4">
                    {safeData.map((v, i) => (
                        <div key={i} className="flex-1 flex flex-col items-center group relative">
                            <div className="absolute -top-8 opacity-0 group-hover:opacity-100 bg-purple-800 text-white text-xs rounded px-2 py-1 font-bold mb-1 transition-opacity">{v}</div>
                            <div className={`w-full rounded-t-xl transition-all duration-700 ${color} opacity-80 hover:opacity-100`} style={{ height: `${(v / Math.max(max, 1)) * 100}%` }}></div>
                            <span className="text-[10px] font-bold text-gray-400 mt-2">{labels[i]}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const SimpleDonutChart = ({ percentage, color = "text-pink-500", label }) => {
            const safePercent = isNaN(percentage) ? 0 : Math.min(Math.max(percentage, 0), 100);
            const r = 30, c = 2 * Math.PI * r, off = c - (safePercent / 100) * c;
            return (
                <div className="relative flex items-center justify-center">
                    <svg height="80" width="80" className="transform -rotate-90"><circle stroke="#f3e8ff" strokeWidth="8" fill="transparent" r={r} cx="40" cy="40"/><circle className={`${color} transition-all duration-1000`} stroke="currentColor" strokeWidth="8" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" fill="transparent" r={r} cx="40" cy="40"/></svg>
                    <span className="absolute text-sm font-black text-gray-700">{label}</span>
                </div>
            );
        };

        // --- KOMPONEN UTAMA ---
        const LaporanBertugas = () => {
            const [activeTab, setActiveTab] = React.useState('harian');
            const [tarikh, setTarikh] = React.useState(getTodayLocal());
            const [toast, setToast] = React.useState({ show: false, message: '' });
            const [bulanPilihan, setBulanPilihan] = React.useState(new Date().getMonth());
            const [tahunPilihan, setTahunPilihan] = React.useState(new Date().getFullYear());
            const [loading, setLoading] = React.useState(false);
            
            // State baru untuk kawal mod kemaskini (Lock / Unlock form)
            const [isEditingMod, setIsEditingMod] = React.useState(true);
            const forceEditRef = React.useRef(false);

            // --- TAMBAHAN UNTUK SENARAI NAMA DINAMIK ---
            const [senaraiPentadbir, setSenaraiPentadbir] = React.useState(SENARAI_PENTADBIR_ASAL);
            const [senaraiGuru, setSenaraiGuru] = React.useState(SENARAI_GURU_ASAL);
            
            // LETAKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
            const URL_GAS_SENARAI_NAMA = "https://script.google.com/macros/s/AKfycbwbe4ZKwFQPMvJTGD-fawtZvsybG-ekJ692aFNmaMgWZcpRIrjle2g_UTXTjkzLhyg5tQ/exec"; 
            const URL_GAS_SIMPAN_DATA = "https://script.google.com/macros/s/AKfycbwbe4ZKwFQPMvJTGD-fawtZvsybG-ekJ692aFNmaMgWZcpRIrjle2g_UTXTjkzLhyg5tQ/exec";

            React.useEffect(() => {
                if (URL_GAS_SENARAI_NAMA && URL_GAS_SENARAI_NAMA !== "") {
                    // Tambah parameter rawak masa (timestamp) untuk elak isu browser 'cache' data lama
                    const fetchUrl = `${URL_GAS_SENARAI_NAMA}?t=${new Date().getTime()}`;
                    
                    fetch(fetchUrl, { redirect: 'follow' })
                        .then(res => {
                            // Jika Google Apps Script bagi respon HTML (biasanya kerana isu Login/Permission), kita halang awal-awal
                            const contentType = res.headers.get("content-type");
                            if (contentType && contentType.indexOf("application/json") !== -1) {
                                return res.json();
                            } else {
                                throw new Error("Sistem GAS tidak memulangkan format JSON. Sila semak tetapan 'Who has access: Anyone'.");
                            }
                        })
                        .then(data => {
                            let berjayaTarik = false;
                            if (data && data.pentadbir && data.pentadbir.length > 0) {
                                setSenaraiPentadbir(data.pentadbir);
                                berjayaTarik = true;
                            }
                            if (data && data.guru && data.guru.length > 0) {
                                setSenaraiGuru(data.guru);
                                berjayaTarik = true;
                            }
                            
                            // Info ringkas jika data Google Sheets berjaya disambung
                            if (berjayaTarik) {
                                console.log("Senarai nama terkini berjaya ditarik dari Google Sheets.");
                            }
                        })
                        .catch(err => {
                            console.error("Ralat memuat turun senarai nama:", err);
                            setToast({ show: true, message: 'Gagal muat turun senarai nama. Semak URL atau tetapan GAS.' });
                            setTimeout(() => setToast({ show: false, message: '' }), 4000);
                        });
                }
            }, []);

            // Admin States
            const [showAdminLogin, setShowAdminLogin] = React.useState(false);
            const [adminPwdInput, setAdminPwdInput] = React.useState('');
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [adminData, setAdminData] = React.useState({});
            
            // Print feature states
            const [adminPrintDate, setAdminPrintDate] = React.useState(getTodayLocal());
            const [printMode, setPrintMode] = React.useState(false);
            
            // New states for Harian Popup Print
            const [showHarianPreview, setShowHarianPreview] = React.useState(false);
            const [previewData, setPreviewData] = React.useState(null);

            const initKehadiranMurid = CLASSES.reduce((acc, cls) => ({ ...acc, [cls]: { hadir: '', tidakHadir: '' } }), {});
            const defaultLaporan = { 
                tarikh: '', pentadbir: '', jawatanPentadbir: '', guruBertugas: Array(6).fill(''), 
                rumusanPerhimpunan: '', kantin: { kualiti: 'Baik', menu: '', catatan: '' }, 
                rmt: { menu: '', kualiti: 'Baik', catatan: '' }, 
                kebersihan: { tandas: 'Bersih', kawasanSekolah: 'Bersih', catatan: '' }, 
                kawalan: { disiplin: 'Terkawal', catatan: '' }, 
                isuDisiplin: [], 
                kehadiranGuru: { hadir: '', tidakHadir: '', sebab: '' }, 
                kehadiranStaf: { hadir: '', tidakHadir: '', sebab: '' }, 
                kehadiranMurid: initKehadiranMurid, 
                muridKeluar: [], pelapor: '', tindakan: '',
                disahkanAdmin: false
            };
            
            const [dataMingguan, setDataMingguan] = React.useState({ Isnin: {...defaultLaporan}, Selasa: {...defaultLaporan}, Rabu: {...defaultLaporan}, Khamis: {...defaultLaporan}, Jumaat: {...defaultLaporan} });

            const [monthlyStats, setMonthlyStats] = React.useState({
                peratusMurid: '0.0', muridTrend: [0, 0, 0, 0], peratusGuruHadir: '0.0', peratusGuruTidakHadir: '0.0', 
                guruTrend: [0, 0, 0, 0], cleanPercent: 0, grade: '-', gradeText: 'Tiada Data'
            });

            const getWeekDates = (dateString) => {
                const curr = new Date(dateString);
                const day = curr.getDay();
                const diffToMon = day === 0 ? -6 : 1 - day;
                const monday = new Date(curr);
                monday.setDate(curr.getDate() + diffToMon);
                
                let weekDates = {};
                const daysMap = ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'];
                
                for(let i=0; i<5; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    const year = d.getFullYear();
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const cDay = String(d.getDate()).padStart(2, '0');
                    weekDates[daysMap[i]] = `${year}-${month}-${cDay}`;
                }
                return weekDates;
            };

            const currentWeekDates = getWeekDates(tarikh);

            const loadDataFromLocalStorage = () => {
                setLoading(true);
                const weekDates = getWeekDates(tarikh);
                
                try {
                    const storedDataRaw = localStorage.getItem(LOCAL_STORAGE_KEY);
                    const storedData = storedDataRaw ? JSON.parse(storedDataRaw) : {};

                    const newDataMingguan = { 
                        Isnin: {...defaultLaporan}, Selasa: {...defaultLaporan}, 
                        Rabu: {...defaultLaporan}, Khamis: {...defaultLaporan}, 
                        Jumaat: {...defaultLaporan} 
                    };

                    Object.keys(weekDates).forEach(day => {
                        const dateStr = weekDates[day];
                        if (storedData[dateStr]) {
                            const updatedKehadiranMurid = { ...initKehadiranMurid, ...(storedData[dateStr].kehadiranMurid || {}) };
                            let updatedIsuDisiplin = storedData[dateStr].isuDisiplin || [];
                            if (typeof updatedIsuDisiplin === 'string') {
                                updatedIsuDisiplin = updatedIsuDisiplin.trim() !== '' ? [{ nama: '', kelas: '', isu: updatedIsuDisiplin }] : [];
                            }

                            newDataMingguan[day] = { ...defaultLaporan, ...storedData[dateStr], kehadiranMurid: updatedKehadiranMurid, isuDisiplin: updatedIsuDisiplin, tarikh: dateStr };
                        } else {
                            newDataMingguan[day].tarikh = dateStr;
                        }
                    });

                    // Semak jika perlu kunci (Lock) pengisian untuk tarikh yang dipilih
                    if (forceEditRef.current) {
                        setIsEditingMod(true);
                        forceEditRef.current = false;
                    } else {
                        // Jika ada data tersimpan untuk tarikh ini, kunci (Lock) form. Jika tiada, buka (Edit).
                        if (storedData[tarikh]) {
                            setIsEditingMod(false);
                        } else {
                            setIsEditingMod(true);
                        }
                    }

                    setDataMingguan(newDataMingguan);
                } catch (err) {
                    console.error("Error loading data:", err);
                    setToast({ show: true, message: 'Gagal memuat turun data!' });
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => { loadDataFromLocalStorage(); }, [tarikh]);

            React.useEffect(() => {
                if (activeTab === 'bulanan') {
                    try {
                        const storedDataRaw = localStorage.getItem(LOCAL_STORAGE_KEY);
                        const allData = storedDataRaw ? JSON.parse(storedDataRaw) : {};
                        
                        let tMuridHadir = 0, tMuridTakHadir = 0, tGuruHadir = 0, tGuruTidakHadir = 0;
                        let cleanScore = 0, cleanCount = 0;
                        let muridMinggu = [ {h:0, t:0}, {h:0, t:0}, {h:0, t:0}, {h:0, t:0}, {h:0, t:0} ];
                        let guruMinggu = [ {h:0, t:0}, {h:0, t:0}, {h:0, t:0}, {h:0, t:0}, {h:0, t:0} ];

                        Object.keys(allData).forEach(dateStr => {
                            const d = new Date(dateStr);
                            if (d.getMonth() === bulanPilihan && d.getFullYear() === tahunPilihan) {
                                const dayData = allData[dateStr];
                                const weekIdx = Math.min(Math.floor((d.getDate() - 1) / 7), 4);
                                
                                if (dayData.pelapor) { 
                                    const tScore = dayData.kebersihan?.tandas === 'Bersih' ? 3 : dayData.kebersihan?.tandas === 'Sederhana' ? 2 : 1;
                                    const kScore = dayData.kebersihan?.kawasanSekolah === 'Bersih' ? 3 : dayData.kebersihan?.kawasanSekolah === 'Sederhana' ? 2 : 1;
                                    cleanScore += (tScore + kScore) / 2;
                                    cleanCount++;
                                }
                                
                                let hHadir = 0, hTakHadir = 0;
                                Object.values(dayData.kehadiranMurid || {}).forEach(k => {
                                    hHadir += parseInt(k.hadir || 0); hTakHadir += parseInt(k.tidakHadir || 0);
                                });
                                tMuridHadir += hHadir; tMuridTakHadir += hTakHadir;
                                muridMinggu[weekIdx].h += hHadir; muridMinggu[weekIdx].t += hTakHadir;
                                
                                const gHadir = parseInt(dayData.kehadiranGuru?.hadir || 0);
                                const gTakHadir = parseInt(dayData.kehadiranGuru?.tidakHadir || 0);
                                tGuruHadir += gHadir; tGuruTidakHadir += gTakHadir;
                                guruMinggu[weekIdx].h += gHadir; guruMinggu[weekIdx].t += gTakHadir;
                            }
                        });
                        
                        const calcPercent = (h, t) => (h+t) > 0 ? (h/(h+t))*100 : 0;
                        let mTrend = muridMinggu.slice(0,4).map(w => calcPercent(w.h, w.t));
                        let gTrend = guruMinggu.slice(0,4).map(w => calcPercent(w.h, w.t));
                        
                        const totalMuridPercent = calcPercent(tMuridHadir, tMuridTakHadir);
                        const totalGuruPercent = calcPercent(tGuruHadir, tGuruTidakHadir);
                        const totalGuruTakHadirPercent = (tGuruHadir+tGuruTidakHadir) > 0 ? (tGuruTidakHadir/(tGuruHadir+tGuruTidakHadir))*100 : 0;
                        
                        const mCleanAvg = cleanCount > 0 ? cleanScore / cleanCount : 0;
                        const mCleanPercent = cleanCount > 0 ? (mCleanAvg / 3) * 100 : 0;
                        
                        let grade = "-"; let gradeText = "Tiada Data";
                        if (cleanCount > 0) {
                            if (mCleanPercent >= 90) { grade = "A"; gradeText = "Cemerlang"; }
                            else if (mCleanPercent >= 80) { grade = "B"; gradeText = "Baik"; }
                            else if (mCleanPercent >= 60) { grade = "C"; gradeText = "Sederhana"; }
                            else { grade = "D"; gradeText = "Lemah/Kotor"; }
                        }
                        
                        setMonthlyStats({
                            peratusMurid: totalMuridPercent.toFixed(1), muridTrend: mTrend.map(v => Math.round(v)),
                            peratusGuruHadir: totalGuruPercent.toFixed(1), peratusGuruTidakHadir: totalGuruTakHadirPercent.toFixed(1),
                            guruTrend: gTrend.map(v => Math.round(v)), cleanPercent: mCleanPercent, grade, gradeText
                        });
                    } catch (err) { console.error("Error computing monthly stats", err); }
                }
            }, [activeTab, bulanPilihan, tahunPilihan]);

            const hariSemasa = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'][new Date(tarikh).getDay()];
            const isWeekend = hariSemasa === 'Sabtu' || hariSemasa === 'Ahad';
            const isLaporanDisahkan = dataMingguan[hariSemasa]?.disahkanAdmin;

            const updateData = (field, val, group, subGroup) => {
                if (isWeekend) return;
                if (isLaporanDisahkan) {
                    setToast({ show: true, message: 'Harap maaf, laporan ini telah disahkan oleh Pentadbir dan tidak boleh diubah.' });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                    return;
                }

                setDataMingguan(prev => {
                    const h = { ...prev[hariSemasa] };
                    if (subGroup) h[group][subGroup] = { ...h[group][subGroup], [field]: val };
                    else if (group) h[group] = { ...h[group], [field]: val };
                    else h[field] = val;
                    return { ...prev, [hariSemasa]: h };
                });
            };

            const handleMurid = (act, idx, e) => {
                if (isLaporanDisahkan) return;
                const list = [...dataMingguan[hariSemasa].muridKeluar];
                if (act === 'add') list.push({ nama: '', kelas: '', masa: '', sebab: '' });
                else if (act === 'del') list.splice(idx, 1);
                else list[idx][e.target.name] = e.target.value;
                updateData('muridKeluar', list);
            };

            const handleIsuDisiplin = (act, idx, e) => {
                if (isLaporanDisahkan) return;
                const list = Array.isArray(dataMingguan[hariSemasa].isuDisiplin) ? [...dataMingguan[hariSemasa].isuDisiplin] : [];
                if (act === 'add') {
                    list.push({ nama: '', kelas: '', isu: '' });
                } else if (act === 'del') {
                    list.splice(idx, 1);
                } else {
                    list[idx][e.target.name] = e.target.value;
                }
                updateData('isuDisiplin', list);
            };

            const handleSimpan = async () => {
                setLoading(true);
                try {
                    // 1. KEKALKAN FUNGSI ASAL: Baca & simpan dalam LocalStorage
                    const storedDataRaw = localStorage.getItem(LOCAL_STORAGE_KEY);
                    const storedData = storedDataRaw ? JSON.parse(storedDataRaw) : {};

                    for (const [dayName, dayData] of Object.entries(dataMingguan)) {
                        if (dayData.tarikh) {
                            if (!storedData[dayData.tarikh] || !storedData[dayData.tarikh].disahkanAdmin) {
                                storedData[dayData.tarikh] = dayData;
                            }
                        }
                    }

                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(storedData));
                    
                    // 2. FUNGSI BARU: Hantar data hari ini ke Google Sheets (Awan)
                    if (URL_GAS_SIMPAN_DATA && URL_GAS_SIMPAN_DATA !== "") {
                        const dataHariIni = dataMingguan[hariSemasa];
                        
                        // Sistem hanya hantar ke Google Sheets jika nama pelapor telah diisi 
                        // (bermaksud laporan dah sedia/tamat untuk hari tersebut)
                        if (dataHariIni && dataHariIni.pelapor) {
                            try {
                                await fetch(URL_GAS_SIMPAN_DATA, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // text/plain elak isu CORS
                                    body: JSON.stringify(dataHariIni)
                                });
                                setToast({ show: true, message: 'Berjaya Disimpan ke Peranti & Google Sheets!' });
                            } catch (error) {
                                console.error("Ralat Apps Script:", error);
                                setToast({ show: true, message: 'Disimpan ke Peranti shj. (Ralat hantar ke awan)' });
                            }
                        } else {
                            setToast({ show: true, message: 'Data Berjaya Disimpan ke Peranti!' });
                        }
                    } else {
                        setToast({ show: true, message: 'Data Berjaya Disimpan ke Peranti!' });
                    }

                    // Kunci borang semula selepas berjaya disimpan
                    setIsEditingMod(false);

                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                } catch (err) {
                    console.error("Error saving:", err);
                    setToast({ show: true, message: 'Gagal menyimpan data!' });
                } finally { setTimeout(() => setLoading(false), 300); }
            };
            
            // FUNGSI ADMIN
            const loadAdminData = () => { const raw = localStorage.getItem(LOCAL_STORAGE_KEY); setAdminData(raw ? JSON.parse(raw) : {}); };
            const handleAdminLogin = () => {
                if (adminPwdInput === '123456789') {
                    setIsAdmin(true); setShowAdminLogin(false); setAdminPwdInput(''); loadAdminData();
                    setToast({ show: true, message: 'Berjaya log masuk sebagai Admin!' });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                } else {
                    setToast({ show: true, message: 'Kata laluan salah!' });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                }
            };
            const handleEndorseRecord = (dateKey) => {
                if (window.confirm(`Sahkan laporan harian untuk tarikh ${dateKey}? Laporan ini tidak akan dapat disunting lagi oleh guru bertugas.`)) {
                    const newData = { ...adminData };
                    if(newData[dateKey]) {
                        newData[dateKey].disahkanAdmin = true;
                        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData)); setAdminData(newData);
                        setToast({ show: true, message: `Laporan ${dateKey} berjaya disahkan.` });
                        setTimeout(() => setToast({ show: false, message: '' }), 3000); loadDataFromLocalStorage();
                    }
                }
            };
            const handleDeleteRecord = (dateKey) => {
                if (window.confirm(`Adakah anda pasti mahu memadam rekod untuk tarikh ${dateKey}?`)) {
                    const newData = { ...adminData }; delete newData[dateKey];
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(newData)); setAdminData(newData);
                    setToast({ show: true, message: `Rekod ${dateKey} berjaya dipadam.` });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000); loadDataFromLocalStorage();
                }
            };
            const handleClearAllData = () => {
                if (window.confirm("AWAS! Adakah anda pasti mahu memadam SEMUA rekod? Tindakan ini tidak boleh dipulihkan.")) {
                    localStorage.removeItem(LOCAL_STORAGE_KEY); setAdminData({});
                    setToast({ show: true, message: 'Semua data telah dipadam.' });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000); loadDataFromLocalStorage();
                }
            };
            const handleExportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(adminData, null, 2));
                const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "skse_backup_" + getTodayLocal() + ".json");
                document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
            };
            const handleEditHarian = (editDate) => {
                forceEditRef.current = true; // Paksa mod kemaskini apabila ditekan dari tab mingguan
                setTarikh(editDate); setActiveTab('harian'); window.scrollTo({ top: 0, behavior: 'smooth' });
                setToast({ show: true, message: `Mod kemaskini untuk ${editDate}` }); setTimeout(() => setToast({ show: false, message: '' }), 3000);
            };
            
            // FUNGSI CETAK ADMIN
            const handleAdminPrint = (type) => {
                if (type === 'harian') {
                    // Logic baru untuk Papar Harian (Popup A4)
                    const dataForDate = adminData[adminPrintDate];
                    if (!dataForDate || !dataForDate.tarikh) {
                        setToast({ show: true, message: `Tiada rekod laporan yang sah untuk tarikh ${adminPrintDate}.` });
                        setTimeout(() => setToast({ show: false, message: '' }), 3000);
                        return;
                    }
                    setPreviewData(dataForDate);
                    setShowHarianPreview(true);
                } else {
                    // Logic lama untuk Papar Mingguan
                    setTarikh(adminPrintDate);
                    setActiveTab(type);
                    setIsAdmin(false);
                    setPrintMode(true);
                    setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 100);
                }
            };

            const calcStats = () => {
                let tAbsent = 0, dAbsent = [], tIssues = 0, cleanScore = 0, cleanCount = 0;
                let tMuridHadir = 0, tMuridTakHadir = 0; let dailyStudentPercent = []; 
                let tGuruHadir = 0, tGuruTidakHadir = 0;
                let classStats = CLASSES.reduce((acc, cls) => ({ ...acc, [cls]: { h: 0, t: 0 } }), {});

                ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'].forEach(d => {
                    const day = dataMingguan[d];
                    let dayHadir = 0, dayTakHadir = 0;

                    if (day.tarikh) {
                        tGuruHadir += parseInt(day.kehadiranGuru.hadir || 0); tGuruTidakHadir += parseInt(day.kehadiranGuru.tidakHadir || 0);
                        tAbsent += parseInt(day.kehadiranGuru.tidakHadir || 0); dAbsent.push(parseInt(day.kehadiranGuru.tidakHadir || 0));
                        
                        // KIRA KES DISIPLIN
                        if (day.kawalan.disiplin && day.kawalan.disiplin !== 'Terkawal') tIssues++;
                        if (Array.isArray(day.isuDisiplin)) {
                            tIssues += day.isuDisiplin.length;
                        } else if (typeof day.isuDisiplin === 'string' && day.isuDisiplin.trim() !== '') {
                            tIssues++;
                        }
                        
                        Object.entries(day.kehadiranMurid || {}).forEach(([cls, k]) => {
                            const h = parseInt(k.hadir || 0); const th = parseInt(k.tidakHadir || 0);
                            dayHadir += h; dayTakHadir += th; tMuridHadir += h; tMuridTakHadir += th;
                            if(classStats[cls]) { classStats[cls].h += h; classStats[cls].t += th; }
                        });
                        
                        const dayTotal = dayHadir + dayTakHadir;
                        dailyStudentPercent.push(dayTotal > 0 ? Math.round((dayHadir / dayTotal) * 100) : 0);
                        
                        if (day.pelapor || dayTotal > 0) {
                            const tScore = day.kebersihan?.tandas === 'Bersih' ? 3 : day.kebersihan?.tandas === 'Sederhana' ? 2 : 1;
                            const kScore = day.kebersihan?.kawasanSekolah === 'Bersih' ? 3 : day.kebersihan?.kawasanSekolah === 'Sederhana' ? 2 : 1;
                            cleanScore += (tScore + kScore) / 2; cleanCount++;
                        }
                    } else { dAbsent.push(0); dailyStudentPercent.push(0); }
                });

                let classPercentages = {};
                CLASSES.forEach(cls => {
                    const totalClass = classStats[cls].h + classStats[cls].t;
                    classPercentages[cls] = totalClass > 0 ? ((classStats[cls].h / totalClass) * 100).toFixed(1) : "0.0";
                });

                const avgClean = cleanCount > 0 ? (cleanScore / cleanCount) : 0;
                const totalMurid = tMuridHadir + tMuridTakHadir;
                const peratusMurid = totalMurid > 0 ? (tMuridHadir / totalMurid) * 100 : 0;
                
                return { 
                    weekly: { 
                        totalAbsent: tAbsent, dailyAbsent: dAbsent, totalIssues: tIssues, 
                        avgClean: avgClean.toFixed(1), cleanPercent: cleanCount > 0 ? (avgClean/3)*100 : 0, 
                        cleanCount, peratusMurid: peratusMurid.toFixed(1), dailyStudentPercent, classPercentages
                    }
                };
            };
            const stats = calcStats(); const { weekly } = stats;

            return (
                <div className="min-h-screen relative">
                    
                    {/* MODAL CETAKAN A4 (HARIAN) */}

                                        <X className="w-5 h-5 mr-2"/> Tutup
                                    </button>
                                </div>
                            </div>

                                    <div className="flex-1 text-center pr-10">
                                        <h1 className="text-xl font-black uppercase tracking-wider">SEKOLAH KEBANGSAAN SIMPANG EMPAT</h1>
                                        <h2 className="text-lg font-bold uppercase mt-1 text-gray-800">Laporan Harian Guru Bertugas</h2>
                                    </div>
                                </div>

                                {/* Info Asas (Tarikh dll) */}
                                <div className="flex justify-between items-center mb-4 text-sm font-bold bg-gray-100 p-2 border border-black">
                                    <span>TARIKH: {previewData.tarikh}</span>
                                    <span className="uppercase">HARI: {['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'][new Date(previewData.tarikh).getDay()]}</span>
                                </div>

                                {/* Jadual Maklumat Bertugas */}
                                <table className="w-full border-collapse border border-black mb-5 text-sm">
                                    <tbody>
                                        <tr>
                                            <td className="border border-black p-2 w-1/3 align-top bg-gray-50 font-bold">Pentadbir Bertugas</td>
                                            <td className="border border-black p-2 w-2/3 uppercase">{previewData.pentadbir || '-'} <br/><span className="text-xs font-normal text-gray-600">({previewData.jawatanPentadbir || '-'})</span></td>
                                        </tr>
                                        <tr>
                                            <td className="border border-black p-2 align-top bg-gray-50 font-bold">Senarai Guru Bertugas</td>
                                            <td className="border border-black p-2 uppercase">
                                                <ul className="list-disc ml-5 text-xs font-semibold">
                                                    {previewData.guruBertugas.filter(Boolean).map((g, i) => <li key={i}>{g}</li>)}
                                                    {previewData.guruBertugas.filter(Boolean).length === 0 && <li>- Tiada Rekod -</li>}
                                                </ul>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                                {/* Jadual Kehadiran Guru & Staf */}
                                <table className="w-full border-collapse border border-black mb-5 text-sm text-center">
                                    <thead>
                                        <tr className="bg-gray-200">
                                            <th className="border border-black p-1.5" colSpan="4">KEHADIRAN GURU & STAF</th>
                                        </tr>
                                        <tr className="bg-gray-50">
                                            <th className="border border-black p-1">Kategori</th>
                                            <th className="border border-black p-1 w-16">Hadir</th>
                                            <th className="border border-black p-1 w-16">TH</th>
                                            <th className="border border-black p-1 text-left pl-2">Sebab / Catatan</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td className="border border-black p-1.5 font-bold">Guru</td>
                                            <td className="border border-black p-1.5">{previewData.kehadiranGuru?.hadir || '-'}</td>
                                            <td className="border border-black p-1.5">{previewData.kehadiranGuru?.tidakHadir || '-'}</td>
                                            <td className="border border-black p-1.5 text-left text-xs uppercase">{previewData.kehadiranGuru?.sebab || '-'}</td>
                                        </tr>
                                        <tr>
                                            <td className="border border-black p-1.5 font-bold">Staf Sokongan</td>
                                            <td className="border border-black p-1.5">{previewData.kehadiranStaf?.hadir || '-'}</td>
                                            <td className="border border-black p-1.5">{previewData.kehadiranStaf?.tidakHadir || '-'}</td>
                                            <td className="border border-black p-1.5 text-left text-xs uppercase">{previewData.kehadiranStaf?.sebab || '-'}</td>
                                        </tr>
                                    </tbody>
                                </table>

                                {/* Jadual Kehadiran Murid Mengikut Kelas (Padat) */}
                                <table className="w-full border-collapse border border-black mb-5 text-xs text-center">
                                    <thead>
                                        <tr className="bg-gray-200">
                                            <th className="border border-black p-1 font-bold text-sm" colSpan="9">KEHADIRAN MURID MENGIKUT KELAS</th>
                                        </tr>
                                        <tr className="bg-gray-50">
                                            <th className="border border-black p-1">Kelas</th><th className="border border-black p-1 w-8">H</th><th className="border border-black p-1 w-8">TH</th>
                                            <th className="border border-black p-1 border-l-2">Kelas</th><th className="border border-black p-1 w-8">H</th><th className="border border-black p-1 w-8">TH</th>
                                            <th className="border border-black p-1 border-l-2">Kelas</th><th className="border border-black p-1 w-8">H</th><th className="border border-black p-1 w-8">TH</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Array.from({ length: Math.ceil(CLASSES.length / 3) }).map((_, rowIndex) => (

                                                    const cls = CLASSES[rowIndex * 3 + colIndex];
                                                    if (!cls) return <React.Fragment key={colIndex}><td className="border border-black p-1 border-l-2"></td><td className="border border-black p-1"></td><td className="border border-black p-1"></td></React.Fragment>;
                                                    const k = previewData.kehadiranMurid?.[cls] || { hadir: '-', tidakHadir: '-' };
                                                    return (
                                                        <React.Fragment key={colIndex}>
                                                            <td className={`border border-black p-1 font-bold uppercase ${colIndex > 0 ? 'border-l-2' : ''}`}>{cls}</td>

                                                        </React.Fragment>
                                                    );
                                                })}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                {/* Jadual Laporan Spesifik */}
                                <table className="w-full border-collapse border border-black mb-5 text-sm">
                                    <thead>

                                            <td className="border border-black p-2 w-1/4 bg-gray-50 font-bold">Kantin Sekolah</td>
                                            <td className="border border-black p-2">Kualiti: <strong>{previewData.kantin?.kualiti || '-'}</strong><br/>Catatan: <span className="uppercase text-xs">{previewData.kantin?.catatan || '-'}</span></td>
                                        </tr>
                                        <tr>
                                            <td className="border border-black p-2 bg-gray-50 font-bold">Kebersihan</td>
                                            <td className="border border-black p-2">Tandas: <strong>{previewData.kebersihan?.tandas || '-'}</strong> | Kawasan Sekolah: <strong>{previewData.kebersihan?.kawasanSekolah || '-'}</strong><br/>Catatan: <span className="uppercase text-xs">{previewData.kebersihan?.catatan || '-'}</span></td>
                                        </tr>
                                        <tr>
                                            <td className="border border-black p-2 bg-gray-50 font-bold">Kawalan Disiplin</td>
                                            <td className="border border-black p-2">Status: <strong>{previewData.kawalan?.disiplin || '-'}</strong><br/>Catatan: <span className="uppercase text-xs">{previewData.kawalan?.catatan || '-'}</span></td>
                                        </tr>
                                        <tr>
                                            <td className="border border-black p-2 bg-gray-50 font-bold">Perhimpunan</td>
                                            <td className="border border-black p-2 uppercase text-xs whitespace-pre-line">{previewData.rumusanPerhimpunan || '-'}</td>
                                        </tr>
                                    </tbody>

                                            ) : (

                                                    {previewData.isuDisiplin.map((isu, idx) => (

                                                    ))}

                                            )}

                                    </div>
                                    <div className="border border-black">
                                        <div className="bg-gray-200 font-bold p-1 border-b border-black text-center">MURID KELUAR AWAL</div>
                                        <div className="p-2 min-h-[60px]">
                                            {!previewData.muridKeluar || previewData.muridKeluar.length === 0 ? (
                                                <p className="text-center italic mt-2">- Tiada Rekod -</p>
                                            ) : (
                                                <ul className="list-disc ml-4 uppercase space-y-1">
                                                    {previewData.muridKeluar.map((m, idx) => (
                                                        <li key={idx}><strong>{m.kelas || 'N/A'}:</strong> {m.nama || 'Tiada Nama'}</li>
                                                    ))}
                                                </ul>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Aktiviti / Program */}
                                <div className="border border-black mb-8 text-sm">
                                    <div className="bg-gray-200 font-bold p-1.5 border-b border-black">AKTIVITI / PROGRAM / TINDAKAN GURU BERTUGAS</div>
                                    <div className="p-3 min-h-[80px] text-xs uppercase whitespace-pre-line">
                                        {previewData.tindakan || '- Tiada catatan -'}
                                    </div>
                                </div>

                                {/* Ruangan Tandatangan */}
                                <div className="flex justify-between mt-12 px-10 text-center text-sm">
                                    <div>
                                        <p className="mb-14 text-xs font-bold">Disediakan Oleh,</p>
                                        <p className="font-bold border-b border-black inline-block px-4 pb-1 uppercase">{previewData.pelapor || '...........................................'}</p>
                                        <p className="text-xs mt-1">Guru Bertugas</p>
                                    </div>
                                    <div>
                                        <p className="mb-14 text-xs font-bold">Disahkan Oleh,</p>
                                        <p className="font-bold border-b border-black inline-block px-4 pb-1 uppercase">{previewData.pentadbir || '...........................................'}</p>
                                        <p className="text-xs mt-1 uppercase">{previewData.jawatanPentadbir || 'Pihak Pentadbir'}</p>
                                    </div>
                                </div>

                                {/* Watermark Status */}
                                {previewData.disahkanAdmin && (
                                    <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-10 pointer-events-none select-none text-[8rem] font-black text-green-600 border-8 border-green-600 rounded-3xl p-4 rotate-[-30deg]">
                                        DISAHKAN
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MAIN APPLICATION (Disembunyikan sepenuhnya jika showHarianPreview aktif) */}
                    <div className={showHarianPreview ? 'hidden print:hidden' : 'bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 pb-10'}>
                        
                        {/* PANEL TERAPUNG MOD CETAKAN MINGGUAN */}
                        {printMode && !isAdmin && !showHarianPreview && (
                            <div className="fixed bottom-0 left-0 right-0 bg-gray-900 text-white p-4 flex flex-col sm:flex-row justify-between items-center z-[150] print-hidden shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-4 border-yellow-400">
                                <div className="mb-3 sm:mb-0 text-center sm:text-left">
                                    <p className="font-bold text-lg text-yellow-400 flex items-center justify-center sm:justify-start">
                                        <Printer className="w-5 h-5 mr-2 animate-pulse" /> MOD CETAKAN {activeTab.toUpperCase()}
                                    </p>
                                    <p className="text-xs text-gray-300">Sila semak maklumat laporan di bawah sebelum menekan butang Cetak.</p>
                                </div>

                                                        {!dataMingguan[hariSemasa].isuDisiplin || dataMingguan[hariSemasa].isuDisiplin.length === 0 ? (
                                                            <div className="text-center p-4 bg-white/50 rounded-xl border border-amber-200 border-dashed">
                                                                <p className="text-sm text-amber-600/70 font-medium">Tiada isu disiplin direkodkan.</p>
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-3">
                                                                {dataMingguan[hariSemasa].isuDisiplin.map((m, i) => (
                                                                    <div key={i} className="flex flex-col gap-2 bg-white p-3 rounded-xl border border-amber-200 shadow-sm relative group">
                                                                        <div className="flex gap-2 items-center">
                                                                            <span className="font-bold text-amber-300 w-5 text-center">{i + 1}</span>
                                                                            <input name="nama" placeholder="Nama Murid (Pilihan)" className="flex-1 text-sm bg-transparent outline-none border-b border-gray-200 focus:border-amber-400 pb-1" value={m.nama || ''} onChange={(e) => handleIsuDisiplin('upd', i, e)} />
                                                                            <select name="kelas" className="w-32 text-xs font-bold bg-gray-50 p-1.5 rounded-lg border border-gray-200 text-gray-600" value={m.kelas || ''} onChange={(e) => handleIsuDisiplin('upd', i, e)}>
                                                                                <option value="">Kelas</option>
                                                                                {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                                                            </select>
                                                                            {!printMode && (
                                                                                <button onClick={() => handleIsuDisiplin('del', i)} className="text-red-400 hover:text-white hover:bg-red-500 p-1.5 rounded transition-all print-hidden">
                                                                                    <Trash2 className="w-4 h-4" />
                                                                                </button>
                                                                            )}
                                                                        </div>
                                                                        <div className="pl-7 pr-2">
                                                                            <input name="isu" placeholder="Perincian Isu Disiplin..." className="w-full text-sm bg-transparent outline-none border-b border-gray-200 focus:border-amber-400 pb-1" value={m.isu || ''} onChange={(e) => handleIsuDisiplin('upd', i, e)} />
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </Card>

                                                    <Card className="bg-gradient-to-br from-red-50 to-rose-50 border-red-100 mb-6">
                                                        <div className="flex justify-between items-center mb-2">
                                                            <h3 className="font-bold text-red-600 flex items-center"><LogOut className="w-5 h-5 mr-2"/> Murid Keluar</h3>
                                                            {!printMode && (
                                                                <button onClick={()=>handleMurid('add')} className="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded shadow print-hidden">+ Tambah</button>
                                                            )}
                                                        </div>
                                                        <div className="space-y-2">
                                                            {dataMingguan[hariSemasa].muridKeluar.length === 0 && (
                                                                <p className="text-sm text-red-400/80 italic pl-2">Tiada murid keluar direkodkan.</p>
                                                            )}
                                                            {dataMingguan[hariSemasa].muridKeluar.map((m,i)=>(
                                                                <div key={i} className="flex gap-2 items-center bg-white p-2 rounded-lg border border-red-100">
                                                                    <span className="font-bold text-red-300 w-4">{i+1}</span>
                                                                    <input name="nama" placeholder="Nama Murid" className="flex-1 text-sm bg-transparent outline-none" value={m.nama} onChange={(e)=>handleMurid('upd',i,e)}/>
                                                                    <select name="kelas" className="w-24 md:w-32 text-xs font-bold bg-gray-50 p-1.5 rounded-lg border border-gray-200 text-gray-600 outline-none focus:border-red-300" value={m.kelas || ''} onChange={(e)=>handleMurid('upd',i,e)}>
                                                                        <option value="">Kelas</option>
                                                                        {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                                                    </select>
                                                                    {!printMode && (
                                                                        <button onClick={()=>handleMurid('del',i)} className="text-red-400 hover:text-red-600 print-hidden"><Trash2 className="w-4 h-4"/></button>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </Card>

                                                    <Card className="mb-6">
                                                        <SectionTitle icon={Activity} title="Aktiviti Program" colorClass="text-blue-600" />
                                                        <textarea rows="3" className="w-full p-3 rounded-xl bg-blue-50 border border-blue-100 text-sm mb-4" placeholder="Senarai aktiviti atau program yang dijalankan pada hari ini..." value={dataMingguan[hariSemasa].tindakan} onChange={(e) => updateData('tindakan', e.target.value)}></textarea>
                                                        
                                                        {/* PENGESAHAN */}
                                                        <hr className="my-6 border-dashed border-gray-200" />
                                                        <h4 className="text-xs font-bold text-gray-500 mb-4 uppercase tracking-wider text-center">Ruangan Pengesahan Laporan</h4>
                                                        <div className="flex justify-between text-center gap-4"><div className="flex-1"><select className="w-full p-2 rounded bg-gray-100 text-sm mb-1" onChange={(e)=>updateData('pelapor',e.target.value)} value={dataMingguan[hariSemasa].pelapor}><option value="">-- Pelapor --</option>{dataMingguan[hariSemasa].guruBertugas.filter(Boolean).map((g,i)=><option key={i}>{g}</option>)}</select><p className="text-[10px] uppercase text-gray-400">Disediakan Oleh</p></div><div className="flex-1"><div className="h-9 mb-1 border-b border-dashed flex items-end justify-center text-xs text-gray-300">{(isLaporanDisahkan || printMode) ? <CheckCircle className="w-4 h-4 text-green-500 mb-1" /> : "Tandatangan"}</div><p className="text-xs font-bold text-gray-600 truncate">{dataMingguan[hariSemasa].pentadbir||"Pentadbir"}</p><p className="text-[10px] uppercase text-gray-400">Disahkan Oleh</p></div></div>
                                                    </Card>

                                                    {isEditingMod && !isLaporanDisahkan && !printMode && (
                                                        <div className="flex justify-end print-hidden"><button onClick={handleSimpan} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg flex items-center"><Save className="w-5 h-5 mr-2" /> Simpan Peranti</button></div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* TAB MINGGUAN */}
                                    {activeTab === 'mingguan' && (
                                        <div className="animate-fade-in-up space-y-6">
                                            <Card className="bg-gradient-to-br from-green-50 to-emerald-50 border-emerald-100 text-center relative">
                                                <h2 className="text-3xl font-black text-emerald-800 uppercase mb-1">Rumusan Mingguan</h2>
                                                <div className="flex justify-center items-center gap-2 mt-2 bg-white px-4 py-2 rounded-xl inline-flex shadow-sm print-hidden">
                                                    <button onClick={()=>{const d=new Date(tarikh);d.setDate(d.getDate()-7);setTarikh(d.toISOString().split('T')[0])}} className="hover:bg-gray-100 p-1 rounded-full transition-colors"><ChevronLeft className="text-gray-500 w-5 h-5"/></button>
                                                    <span className="font-bold text-gray-700 uppercase tracking-widest text-sm mx-2">
                                                        {currentWeekDates['Isnin']} <span className="text-gray-400 font-normal lowercase mx-1">hingga</span> {currentWeekDates['Jumaat']}
                                                    </span>
                                                    <button onClick={()=>{const d=new Date(tarikh);d.setDate(d.getDate()+7);setTarikh(d.toISOString().split('T')[0])}} className="hover:bg-gray-100 p-1 rounded-full transition-colors"><ChevronRight className="text-gray-500 w-5 h-5"/></button>
                                                </div>
                                                <div className="hidden print:block font-bold mt-2 text-sm uppercase">Minggu: {currentWeekDates['Isnin']} hingga {currentWeekDates['Jumaat']}</div>
                                            </Card>

                                            <div className="grid md:grid-cols-4 gap-4">
                                                <StatCard title="Guru TH" value={weekly.totalAbsent} subtext="Minggu Ini" icon={Users} colorClass="text-rose-600"><SimpleBarChart data={weekly.dailyAbsent} labels={['I','S','R','K','J']} color="bg-rose-400" /></StatCard>
                                                <StatCard title="Kehadiran Murid" value={`${weekly.peratusMurid}%`} subtext="Purata Mingguan" icon={GraduationCap} colorClass="text-blue-600"><div className="mt-4"><p className="text-[10px] text-gray-400 mb-1 font-semibold uppercase">Trend Harian</p><SimpleBarChart data={weekly.dailyStudentPercent} labels={['I','S','R','K','J']} color="bg-blue-400" /></div></StatCard>
                                                <StatCard title="Skor Bersih" value={weekly.avgClean} subtext={weekly.cleanCount > 0 ? "/ 3.0" : "Tiada Data"} icon={MapPin} colorClass="text-emerald-600"><div className="flex justify-center py-2"><SimpleDonutChart percentage={weekly.cleanPercent} label={`${Math.round(weekly.cleanPercent)}%`} color="text-emerald-500" /></div></StatCard>
                                                <StatCard title="Isu Disiplin" value={weekly.totalIssues} subtext="Kes" icon={ShieldCheck} colorClass="text-amber-600"><div className="flex-1 flex items-center justify-center font-bold text-sm text-amber-700">{weekly.totalIssues===0?"TIADA":"ADA ISU"}</div></StatCard>
                                            </div>

                                            <Card className="bg-gradient-to-br from-blue-50 to-indigo-50 border-indigo-100">
                                                <SectionTitle icon={GraduationCap} title="Peratus Kehadiran Mengikut Kelas" colorClass="text-blue-700" />
                                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 mt-4">
                                                    {CLASSES.map(cls => {
                                                        const peratus = parseFloat(weekly.classPercentages[cls]);
                                                        const isLow = peratus < 80;
                                                        return (
                                                            <div key={cls} className="bg-white p-3 rounded-xl border border-blue-100 shadow-sm relative overflow-hidden flex flex-col justify-between h-20">
                                                                <div className="relative z-10 flex flex-col items-center text-center mt-1"><p className="text-[9px] font-bold text-blue-800 uppercase mb-1 truncate w-full">{cls}</p><h4 className={`text-xl font-black ${isLow ? 'text-red-500' : 'text-blue-600'}`}>{weekly.classPercentages[cls]}<span className="text-xs font-bold">%</span></h4></div>
                                                                <div className="absolute bottom-0 left-0 h-1.5 bg-gray-100 w-full print:border-t print:border-gray-300 print:bg-transparent"><div className={`h-full ${isLow ? 'bg-red-400' : 'bg-blue-500'} print:bg-black print:h-[2px]`} style={{width: `${peratus}%`}}></div></div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </Card>

                                            <Card className="p-0 overflow-hidden">
                                                <div className="p-4 bg-gray-50 border-b flex justify-between items-center"><h4 className="font-bold text-gray-700">Perincian Harian</h4></div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-sm text-left">
                                                        <thead className="bg-white text-gray-400 uppercase text-xs font-bold border-b">
                                                            <tr>
                                                                <th className="p-4">Hari</th>
                                                                <th className="p-4">Tarikh</th>
                                                                <th className="p-4 text-center">Guru TH</th>
                                                                <th className="p-4">Aktiviti Program</th>
                                                                <th className="p-4 text-center">Pengesahan</th>
                                                                <th className="p-4 text-center print-hidden">Tindakan</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-gray-50">
                                                            {['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'].map(d => (
                                                                <tr key={d} className="hover:bg-purple-50/50">
                                                                    <td className="p-4 font-bold text-purple-900">{d}</td>
                                                                    <td className="p-4 text-xs font-mono text-gray-500">{dataMingguan[d].tarikh || '-'}</td>
                                                                    <td className="p-4 text-center font-bold text-red-500">{dataMingguan[d].kehadiranGuru.tidakHadir || '-'}</td>
                                                                    <td className="p-4 text-gray-600 line-clamp-2">{dataMingguan[d].tindakan || dataMingguan[d].rumusanPerhimpunan || '-'}</td>
                                                                    <td className="p-4 text-center">
                                                                        {dataMingguan[d].tarikh && dataMingguan[d].disahkanAdmin ? (<span className="text-[10px] bg-green-100 text-green-700 px-2 py-1 rounded-full font-bold uppercase tracking-wider">Disahkan</span>) : dataMingguan[d].tarikh ? (<span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded-full font-bold uppercase tracking-wider">Belum</span>) : <span className="text-gray-300">-</span>}
                                                                    </td>
                                                                    <td className="p-4 text-center print-hidden">
                                                                        {dataMingguan[d].tarikh && !dataMingguan[d].disahkanAdmin && !printMode && (
                                                                            <button onClick={() => handleEditHarian(dataMingguan[d].tarikh)} title={`Edit Laporan ${d}`} className="text-xs bg-indigo-50 hover:bg-indigo-600 text-indigo-600 hover:text-white font-bold py-1.5 px-3 rounded-lg flex items-center justify-center transition-colors border border-indigo-200 shadow-sm mx-auto"><FileEdit className="w-3.5 h-3.5 mr-1"/> Edit</button>
                                                                        )}
                                                                        {dataMingguan[d].tarikh && dataMingguan[d].disahkanAdmin && (<span className="text-[10px] text-gray-400 italic font-medium flex items-center justify-center"><Lock className="w-3 h-3 mr-1"/> Dikunci</span>)}
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </Card>
                                        </div>
                                    )}

                                    {/* TAB BULANAN */}
                                    {activeTab === 'bulanan' && (
                                        <div className="animate-fade-in-up space-y-6">
                                            <Card className="bg-gradient-to-br from-purple-50 to-fuchsia-50 border-fuchsia-100 text-center">
                                                <h2 className="text-3xl font-black text-fuchsia-900 uppercase mb-2">Laporan Bulanan</h2>
                                                <div className="flex justify-center gap-3">
                                                    <select className="p-2 rounded-xl bg-white border-none shadow-sm font-bold text-gray-700" value={bulanPilihan} onChange={e=>setBulanPilihan(parseInt(e.target.value))}>{MONTHS.map((b,i)=><option key={i} value={i}>{b}</option>)}</select>
                                                    <select className="p-2 rounded-xl bg-white border-none shadow-sm font-bold text-gray-700" value={tahunPilihan} onChange={e=>setTahunPilihan(parseInt(e.target.value))}><option>2024</option><option>2025</option><option>2026</option></select>
                                                </div>
                                            </Card>
                                            
                                            <div className="grid md:grid-cols-3 gap-6">
                                                <StatCard title="Kehadiran Murid" value={`${monthlyStats.peratusMurid}%`} subtext={`Purata Bulan ${MONTHS[bulanPilihan]}`} icon={GraduationCap} colorClass="text-blue-600"><div className="mt-2"><p className="text-[10px] font-bold text-gray-400 mb-1 uppercase">Trend Mingguan (M1-M4)</p><SimpleBarChart data={monthlyStats.muridTrend} labels={['M1','M2','M3','M4']} color="bg-blue-400" /></div></StatCard>
                                                <StatCard title="Statistik Guru" value={`${monthlyStats.peratusGuruHadir}%`} subtext={`Hadir (${monthlyStats.peratusGuruTidakHadir}% Tidak Hadir)`} icon={Users} colorClass="text-purple-600"><div className="mt-2"><p className="text-[10px] font-bold text-gray-400 mb-1 uppercase">Trend Mingguan (M1-M4)</p><SimpleBarChart data={monthlyStats.guruTrend} labels={['M1', 'M2', 'M3', 'M4']} color="bg-purple-400" /></div></StatCard>
                                                <StatCard title="Gred Kebersihan" value={monthlyStats.grade} subtext={monthlyStats.gradeText} icon={CheckCircle} colorClass="text-emerald-600"><div className="flex justify-center py-2"><SimpleDonutChart percentage={monthlyStats.cleanPercent} label={`${Math.round(monthlyStats.cleanPercent)}%`} color="text-emerald-500" /></div></StatCard>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LaporanBertugas />);
    </script>
</body>
</html>
