<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Bertugas SK Simpang Empat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (Vanilla) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Supabase Client -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slide-in-up { animation: slideInUp 0.3s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
        @media print { 
            @page { margin: 0.5cm; size: A4; } 
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; font-size: 12px; } 
            nav, button, select, .print-hidden { display: none !important; } 
            .shadow-xl, .shadow-sm, .shadow-md { box-shadow: none !important; }
            .bg-gradient-to-b, .bg-gradient-to-r { background: none !important; }
            .rounded-3xl, .rounded-2xl, .rounded-xl { border-radius: 0 !important; border: 1px solid #ccc !important; }
            input, textarea { border: none !important; resize: none; padding: 0 !important; } 
            textarea { height: auto; min-height: 20px; } 
            input[type="text"] { width: 100%; } 
            table, th, td { border-collapse: collapse; }
            .print-bg-gray { background-color: #e5e7eb !important; }
            .print-text-black { color: black !important; }
            .print-border-black { border-color: black !important; border-width: 1px !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://heujuwwwfojgjozcwjlo.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhldWp1d3d3Zm9qZ2pvemN3amxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc0NTgzNzIsImV4cCI6MjA4MzAzNDM3Mn0.UKFGWoeqLNJMcGeN4nn-iK-kRA5wyQwrU1BPwNlkUlA";
        
        // Inisialisasi Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- ICONS SETUP ---
        const IconWrapper = ({ name, className, ...props }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                className: className, ...props,
                dangerouslySetInnerHTML: { __html: iconData.map(child => {
                    const [tag, attrs] = child;
                    const attrString = Object.entries(attrs).map(([key, val]) => `${key}="${val}"`).join(' ');
                    return `<${tag} ${attrString}></${tag}>`;
                }).join('') }
            });
        };
        const createIcon = (name) => (props) => <IconWrapper name={name} {...props} />;
        
        // Icons List
        const ClipboardList = createIcon('ClipboardList'); const Users = createIcon('Users');
        const Utensils = createIcon('Utensils'); const School = createIcon('School');
        const UserCheck = createIcon('UserCheck'); const LogOut = createIcon('LogOut');
        const Printer = createIcon('Printer'); const CheckCircle = createIcon('CheckCircle');
        const Calendar = createIcon('Calendar'); const BarChart3 = createIcon('BarChart3');
        const FileText = createIcon('FileText'); const UserCog = createIcon('UserCog');
        const AlertTriangle = createIcon('AlertTriangle'); const Save = createIcon('Save');
        const TrendingUp = createIcon('TrendingUp'); const TrendingDown = createIcon('TrendingDown');
        const Minus = createIcon('Minus'); const AlertCircle = createIcon('AlertCircle');
        const CalendarDays = createIcon('CalendarDays'); const ChevronLeft = createIcon('ChevronLeft');
        const ChevronRight = createIcon('ChevronRight'); const Coffee = createIcon('Coffee');
        const ShieldCheck = createIcon('ShieldCheck'); const MapPin = createIcon('MapPin');
        const Trash2 = createIcon('Trash2'); const Activity = createIcon('Activity');
        const Check = createIcon('Check'); const GraduationCap = createIcon('GraduationCap');
        const X = createIcon('X');

        // --- DATA PEMALAR ---
        const CLASSES = ['PRA CEMERLANG', 'PRA GEMILANG', '1 SETIA', '1 IKHLAS', '2 MAJU', '2 PERKASA', '3 NAIM', '3 AKTIF', '4 GIGIH', '4 EHSAN', '5 MAHIR', '5 PINTAR', '6 ARIF', '6 TEKUN'];
        const MONTHS = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];

        // --- KOMPONEN UI ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl border-2 border-white/50 p-6 transition-all hover:shadow-2xl ${className} print:shadow-none print:border-black print:rounded-none`}>{children}</div>
        );

        const SectionTitle = ({ icon: Icon, title, colorClass = "text-purple-600" }) => (
            <h3 className={`flex items-center text-lg font-bold mb-4 print-text-black print:text-base border-b-2 border-dashed border-gray-200 pb-2 ${colorClass}`}>
                <Icon className={`w-6 h-6 mr-2 ${colorClass} print-hidden`} /> {title}
            </h3>
        );

        const NavButton = ({ active, onClick, icon: Icon, label }) => (
            <button onClick={onClick} className={`flex-1 flex items-center justify-center px-4 py-3 rounded-2xl font-bold transition-all transform ${active ? 'bg-white text-purple-700 shadow-lg scale-105 ring-4 ring-purple-200' : 'bg-white/20 text-white hover:bg-white/30 hover:scale-105'}`}>
                <Icon className="w-5 h-5 mr-2" /> {label}
            </button>
        );

        const StatCard = ({ title, value, subtext, icon: Icon, colorClass, children }) => (
            <Card className="flex flex-col justify-between h-full border-t-4 border-t-current" style={{ borderColor: colorClass.includes('text-') ? undefined : '' }}>
                <div className={`flex justify-between items-start mb-2 ${colorClass.includes('border') ? '' : 'border-t-0'}`} style={{ borderColor: 'inherit' }}>
                    <div><p className="text-xs font-bold uppercase tracking-wider text-gray-400">{title}</p><h4 className={`text-4xl font-black mt-2 ${colorClass}`}>{value}</h4>{subtext && <span className="text-xs font-medium text-gray-400">{subtext}</span>}</div>
                    <div className={`p-3 rounded-2xl bg-gray-50 ${colorClass.replace('text-', 'bg-').replace('600', '100').replace('500', '100')}`}><Icon className="w-6 h-6" /></div>
                </div>
                {children}
            </Card>
        );

        const SimpleBarChart = ({ data, labels, color = "bg-purple-400" }) => {
            const safeData = Array.isArray(data) ? data : [0, 0, 0, 0, 0];
            const max = Math.max(...safeData, 1);
            return (
                <div className="flex items-end space-x-3 h-24 w-full pt-4">
                    {safeData.map((v, i) => (
                        <div key={i} className="flex-1 flex flex-col items-center group relative">
                            <div className="absolute -top-8 opacity-0 group-hover:opacity-100 bg-purple-800 text-white text-xs rounded px-2 py-1 font-bold mb-1">{v}</div>
                            <div className={`w-full rounded-t-xl transition-all duration-700 ${color} opacity-80 hover:opacity-100 print-bg-gray`} style={{ height: `${(v / Math.max(max, 1)) * 100}%` }}></div>
                            <span className="text-[10px] font-bold text-gray-400 mt-2">{labels[i]}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const SimpleDonutChart = ({ percentage, color = "text-pink-500", label }) => {
            const r = 30, c = 2 * Math.PI * r, off = c - (Math.min(Math.max(percentage || 0, 0), 100) / 100) * c;
            return (
                <div className="relative flex items-center justify-center">
                    <svg height="80" width="80" className="transform -rotate-90"><circle stroke="#f3e8ff" strokeWidth="8" fill="transparent" r={r} cx="40" cy="40"/><circle className={`${color} transition-all duration-1000 print-text-black`} stroke="currentColor" strokeWidth="8" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" fill="transparent" r={r} cx="40" cy="40"/></svg>
                    <span className="absolute text-sm font-black text-gray-700">{label}</span>
                </div>
            );
        };

        const TrendIndicator = ({ current, previous, inverse = false }) => {
            if (current === previous) return <div className="flex items-center text-gray-400 text-xs font-bold bg-gray-100 px-2 py-1 rounded-full"><Minus className="w-3 h-3 mr-1"/> Stabil</div>;
            const isGood = inverse ? current < previous : current > previous;
            return <div className={`flex items-center ${isGood ? "text-emerald-600 bg-emerald-100" : "text-rose-600 bg-rose-100"} text-xs font-bold px-3 py-1 rounded-full`}><TrendingUp className={`w-3 h-3 mr-1 ${current < previous ? 'transform rotate-180' : ''}`} />{Math.abs(((current - previous)/ (previous || 1) * 100)).toFixed(0)}%</div>;
        };

        // --- KOMPONEN UTAMA ---
        const LaporanBertugas = () => {
            const [activeTab, setActiveTab] = React.useState('harian');
            const [tarikh, setTarikh] = React.useState(new Date().toISOString().split('T')[0]);
            const [toast, setToast] = React.useState({ show: false, message: '' });
            const [bulanPilihan, setBulanPilihan] = React.useState(new Date().getMonth());
            const [tahunPilihan, setTahunPilihan] = React.useState(new Date().getFullYear());
            const [loading, setLoading] = React.useState(false);

            const initKehadiranMurid = CLASSES.reduce((acc, cls) => ({ ...acc, [cls]: { hadir: '', tidakHadir: '' } }), {});
            const defaultLaporan = { 
                tarikh: '', pentadbir: '', jawatanPentadbir: '', guruBertugas: Array(6).fill(''), 
                rumusanPerhimpunan: '', kantin: { kualiti: 'Baik', menu: '', catatan: '' }, 
                rmt: { menu: '', kualiti: 'Baik', catatan: '' }, 
                kebersihan: { tandas: 'Baik', kawasanSekolah: 'Baik', catatan: '' }, 
                kawalan: { disiplin: 'Terkawal', catatan: '' }, 
                kehadiranGuru: { hadir: '', tidakHadir: '', sebab: '' }, 
                kehadiranStaf: { hadir: '', tidakHadir: '', sebab: '' }, 
                kehadiranMurid: initKehadiranMurid, 
                muridKeluar: [], pelapor: '', tindakan: '' 
            };
            
            const [dataMingguan, setDataMingguan] = React.useState({ Isnin: {...defaultLaporan}, Selasa: {...defaultLaporan}, Rabu: {...defaultLaporan}, Khamis: {...defaultLaporan}, Jumaat: {...defaultLaporan} });

            // Helper dapatkan tarikh untuk Isnin - Jumaat minggu semasa
            const getWeekDates = (dateString) => {
                const curr = new Date(dateString);
                const day = curr.getDay();
                const diffToMon = day === 0 ? -6 : 1 - day;
                const monday = new Date(curr);
                monday.setDate(curr.getDate() + diffToMon);
                
                let weekDates = {};
                const daysMap = ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'];
                
                for(let i=0; i<5; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    weekDates[daysMap[i]] = d.toISOString().split('T')[0];
                }
                return weekDates;
            };

            // LOAD DATA DARI SUPABASE
            const loadDataFromSupabase = async () => {
                setLoading(true);
                const weekDates = getWeekDates(tarikh);
                const datesArray = Object.values(weekDates);
                
                try {
                    const { data, error } = await supabase
                        .from('laporan_harian')
                        .select('*')
                        .in('tarikh', datesArray);

                    if (error) throw error;

                    const newDataMingguan = { 
                        Isnin: {...defaultLaporan}, Selasa: {...defaultLaporan}, 
                        Rabu: {...defaultLaporan}, Khamis: {...defaultLaporan}, 
                        Jumaat: {...defaultLaporan} 
                    };

                    if (data) {
                        data.forEach(row => {
                            if (newDataMingguan[row.hari]) {
                                newDataMingguan[row.hari] = { ...row.laporan_data, tarikh: row.tarikh };
                            }
                        });
                    }
                    
                    Object.keys(weekDates).forEach(day => {
                        if (!newDataMingguan[day].tarikh) {
                            newDataMingguan[day].tarikh = weekDates[day];
                        }
                    });

                    setDataMingguan(newDataMingguan);
                } catch (err) {
                    console.error("Error loading data:", err);
                    setToast({ show: true, message: 'Gagal memuat turun data!' });
                } finally {
                    setLoading(false);
                }
            };

            React.useEffect(() => {
                loadDataFromSupabase();
            }, [tarikh]);

            const hariSemasa = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'][new Date(tarikh).getDay()];
            const isWeekend = hariSemasa === 'Sabtu' || hariSemasa === 'Ahad';

            const updateData = (field, val, group, subGroup) => {
                if (isWeekend) return;
                setDataMingguan(prev => {
                    const h = { ...prev[hariSemasa] };
                    if (subGroup) h[group][subGroup] = { ...h[group][subGroup], [field]: val };
                    else if (group) h[group] = { ...h[group], [field]: val };
                    else h[field] = val;
                    return { ...prev, [hariSemasa]: h };
                });
            };

            const handleMurid = (act, idx, e) => {
                const list = [...dataMingguan[hariSemasa].muridKeluar];
                if (act === 'add') list.push({ nama: '', kelas: '', masa: '', sebab: '' });
                else if (act === 'del') list.splice(idx, 1);
                else list[idx][e.target.name] = e.target.value;
                updateData('muridKeluar', list);
            };

            // SIMPAN DATA KE SUPABASE
            const handleSimpan = async () => {
                setLoading(true);
                try {
                    const updates = [];
                    for (const [dayName, dayData] of Object.entries(dataMingguan)) {
                        if (dayData.tarikh) {
                            updates.push({
                                tarikh: dayData.tarikh,
                                hari: dayName,
                                laporan_data: dayData
                            });
                        }
                    }

                    const { error } = await supabase
                        .from('laporan_harian')
                        .upsert(updates, { onConflict: 'tarikh' });

                    if (error) throw error;

                    setToast({ show: true, message: 'Data Berjaya Disimpan ke Cloud!' });
                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                } catch (err) {
                    console.error("Error saving:", err);
                    setToast({ show: true, message: 'Gagal menyimpan data!' });
                } finally {
                    setLoading(false);
                }
            };
            
            const calcStats = () => {
                let tAbsent = 0, dAbsent = [], tIssues = 0, cleanScore = 0, count = 0;
                let tMuridHadir = 0, tMuridTakHadir = 0;
                let dailyStudentPercent = []; 
                let tGuruHadir = 0;
                let tGuruTidakHadir = 0;

                ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'].forEach(d => {
                    const day = dataMingguan[d];
                    let dayHadir = 0, dayTakHadir = 0;

                    if (day.tarikh) {
                        tGuruHadir += parseInt(day.kehadiranGuru.hadir || 0);
                        tGuruTidakHadir += parseInt(day.kehadiranGuru.tidakHadir || 0);

                        tAbsent += parseInt(day.kehadiranGuru.tidakHadir || 0);
                        dAbsent.push(parseInt(day.kehadiranGuru.tidakHadir || 0));
                        if (day.kawalan.disiplin !== 'Terkawal') tIssues++;
                        cleanScore += (day.kebersihan.kawasanSekolah === 'Bersih' ? 3 : day.kebersihan.kawasanSekolah === 'Sederhana' ? 2 : 1);
                        
                        Object.values(day.kehadiranMurid || {}).forEach(k => {
                            const h = parseInt(k.hadir || 0);
                            const th = parseInt(k.tidakHadir || 0);
                            dayHadir += h; dayTakHadir += th;
                            tMuridHadir += h; tMuridTakHadir += th;
                        });
                        
                        const dayTotal = dayHadir + dayTakHadir;
                        dailyStudentPercent.push(dayTotal > 0 ? Math.round((dayHadir / dayTotal) * 100) : 0);
                        count++;
                    } else {
                        dAbsent.push(0);
                        dailyStudentPercent.push(0);
                    }
                });

                const avgClean = count > 0 ? (cleanScore / count) : 0;
                const totalMurid = tMuridHadir + tMuridTakHadir;
                const peratusMurid = totalMurid > 0 ? (tMuridHadir / totalMurid) * 100 : 0;
                
                const totalGuru = tGuruHadir + tGuruTidakHadir;
                const peratusGuruHadir = totalGuru > 0 ? (tGuruHadir / totalGuru) * 100 : 0;
                const peratusGuruTidakHadir = totalGuru > 0 ? (tGuruTidakHadir / totalGuru) * 100 : 0;

                return { 
                    weekly: { 
                        totalAbsent: tAbsent, dailyAbsent: dAbsent, totalIssues: tIssues, avgClean: avgClean.toFixed(1), 
                        cleanPercent: (avgClean/3)*100, count, peratusMurid: peratusMurid.toFixed(1), dailyStudentPercent,
                        prev: { totalAbsent: tAbsent+2, totalIssues: tIssues-1, avgClean: avgClean-0.2, peratusMurid: peratusMurid-2 }
                    },
                    monthly: {
                        guruHadir: tGuruHadir,
                        guruTidakHadir: tGuruTidakHadir,
                        peratusHadir: peratusGuruHadir.toFixed(0),
                        peratusTidakHadir: peratusGuruTidakHadir.toFixed(0)
                    }
                };
            };
            const stats = calcStats();
            const { weekly } = stats;

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 font-sans pb-10 text-gray-700">
                    {toast.show && <div className="fixed bottom-5 right-5 bg-purple-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center animate-bounce z-50 print-hidden"><CheckCircle className="mr-2 text-green-400"/> {toast.message}</div>}
                    
                    {loading && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] print-hidden">
                            <div className="bg-white p-4 rounded-lg shadow-xl flex items-center">
                                <Activity className="animate-spin mr-2 text-blue-600" /> Memuatkan Data...
                            </div>
                        </div>
                    )}

                    <nav className="bg-gradient-to-r from-violet-600 via-fuchsia-500 to-pink-500 text-white shadow-lg sticky top-0 z-50 pb-4 pt-4 px-4 rounded-b-[2.5rem] mb-6 print:hidden">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
                            <div className="flex items-center space-x-3 mb-4 md:mb-0">
                                <div className="bg-white p-2 rounded-2xl shadow-inner">
                                    <img src="https://i.postimg.cc/W4vLfYrm/LOGO-SKSE-utk-background-putih-(2).jpg" alt="Logo SKSE" className="h-10 w-auto object-contain"/>
                                </div>
                                <div><h1 className="text-xl font-black tracking-tight">SK SIMPANG EMPAT</h1><p className="text-xs text-pink-100 font-medium tracking-widest uppercase">Sistem Guru Bertugas</p></div>
                            </div>
                            <div className="flex space-x-3 bg-white/20 p-1.5 rounded-3xl backdrop-blur-md">
                                {['harian', 'mingguan', 'bulanan'].map(t => (
                                    <NavButton key={t} active={activeTab === t} onClick={() => setActiveTab(t)} icon={t==='harian'?FileText:t==='mingguan'?Activity:BarChart3} label={t.charAt(0).toUpperCase() + t.slice(1)} />
                                ))}
                            </div>
                            <button onClick={() => window.print()} className="ml-4 bg-yellow-400 hover:bg-yellow-300 text-yellow-900 px-5 py-2.5 rounded-2xl font-bold shadow-lg transform hover:-translate-y-1 transition-all flex items-center"><Printer className="w-5 h-5 mr-2" /> Cetak</button>
                        </div>
                    </nav>

                    <div className="max-w-5xl mx-auto px-4 print:w-full print:max-w-none">
                        
                        {/* --- TAB HARIAN --- */}
                        {activeTab === 'harian' && (
                            <div className="animate-fade-in-up space-y-6">
                                <Card className="text-center bg-gradient-to-b from-white to-purple-50 border-purple-100">
                                    <h2 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-600 uppercase mb-2">LAPORAN HARIAN GURU BERTUGAS</h2>
                                    <p className="text-lg font-bold text-gray-600 tracking-widest uppercase mb-4">SK SIMPANG EMPAT 2026</p>
                                    <div className="flex justify-center mt-4 items-center gap-2">
                                        <Calendar className="w-5 h-5 text-purple-500" />
                                        <input type="date" value={tarikh} onChange={(e) => setTarikh(e.target.value)} className="bg-transparent font-black text-purple-900 outline-none uppercase text-lg" />
                                        <span className="bg-purple-100 text-purple-600 px-2 py-0.5 rounded text-xs font-bold uppercase">{hariSemasa}</span>
                                    </div>
                                </Card>

                                <Card className="bg-gradient-to-r from-blue-50 to-indigo-50 border-indigo-100 print:hidden">
                                    <div className="flex justify-between items-center mb-3"><h4 className="font-bold text-indigo-800 flex items-center"><Activity className="w-5 h-5 mr-2" /> Status Mingguan</h4><span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">{['Isnin','Selasa','Rabu','Khamis','Jumaat'].filter(d=>dataMingguan[d].pelapor).length}/5</span></div>
                                    <div className="flex justify-between">{['Isnin','Selasa','Rabu','Khamis','Jumaat'].map(d=><div key={d} className="flex flex-col items-center"><div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 ${dataMingguan[d].pelapor?'bg-green-500 border-green-400 text-white':'bg-white border-gray-200 text-gray-300'}`}>{dataMingguan[d].pelapor?<Check className="w-4 h-4"/>:d[0]}</div><span className="text-[10px] font-bold mt-1 uppercase text-gray-400">{d.slice(0,3)}</span></div>)}</div>
                                </Card>

                                {isWeekend ? (
                                    <Card className="text-center py-12"><AlertTriangle className="w-16 h-16 mx-auto text-orange-400 mb-4"/><h3 className="text-2xl font-bold text-gray-700">Hari Minggu!</h3></Card>
                                ) : (
                                    <>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <Card className="bg-gradient-to-br from-amber-50 to-orange-50 border-orange-100">
                                                <SectionTitle icon={UserCog} title="Pentadbir" colorClass="text-orange-600" />
                                                <input type="text" placeholder="Nama Pentadbir" className="w-full p-2 mb-2 rounded-lg border bg-white font-bold" value={dataMingguan[hariSemasa].pentadbir} onChange={(e) => updateData('pentadbir', e.target.value)} />
                                                <select className="w-full p-2 rounded-lg border bg-white text-sm" value={dataMingguan[hariSemasa].jawatanPentadbir} onChange={(e) => updateData('jawatanPentadbir', e.target.value)}><option value="">-- Jawatan --</option><option>Guru Besar</option><option>PK Pentadbiran</option><option>PK HEM</option><option>PK Ko-kurikulum</option><option>PK PPKI</option></select>
                                            </Card>
                                            <Card className="bg-gradient-to-br from-blue-50 to-cyan-50 border-cyan-100">
                                                <SectionTitle icon={Users} title="Guru Bertugas" colorClass="text-cyan-600" />
                                                <div className="grid grid-cols-2 gap-2">{dataMingguan[hariSemasa].guruBertugas.map((g, i) => (<input key={i} type="text" placeholder={`Guru ${i+1}`} className="p-2 text-sm rounded-lg border bg-white" value={g} onChange={(e) => {const n=[...dataMingguan[hariSemasa].guruBertugas]; n[i]=e.target.value; updateData('guruBertugas', n)}} />))}</div>
                                            </Card>
                                        </div>

                                        <Card className="bg-gradient-to-br from-violet-50 to-indigo-50 border-indigo-100">
                                            <SectionTitle icon={UserCheck} title="Kehadiran Staf" colorClass="text-indigo-600" />
                                            <div className="grid grid-cols-2 gap-4">
                                                {['Guru','Staf'].map((t,i)=>{
                                                    const g=i===0?'kehadiranGuru':'kehadiranStaf';
                                                    return (<div key={i} className="bg-white p-2 rounded-xl border"><p className="font-bold text-indigo-800 mb-1">{t}</p><div className="flex gap-2 mb-1"><input className="w-full bg-green-50 text-center font-bold text-green-700 rounded" placeholder="Hadir" value={dataMingguan[hariSemasa][g].hadir} onChange={(e)=>updateData('hadir',e.target.value,g)}/><input className="w-full bg-red-50 text-center font-bold text-red-700 rounded" placeholder="TH" value={dataMingguan[hariSemasa][g].tidakHadir} onChange={(e)=>updateData('tidakHadir',e.target.value,g)}/></div><textarea rows="1" className="w-full text-xs p-1 bg-gray-50 rounded" placeholder="Catatan..." value={dataMingguan[hariSemasa][g].sebab} onChange={(e)=>updateData('sebab',e.target.value,g)}></textarea></div>)
                                                })}
                                            </div>
                                        </Card>

                                        <Card className="bg-gradient-to-br from-sky-50 to-blue-50 border-blue-100">
                                            <SectionTitle icon={GraduationCap} title="Kehadiran Murid Mengikut Kelas" colorClass="text-blue-600" />
                                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                                {CLASSES.map((cls) => {
                                                    const k = dataMingguan[hariSemasa].kehadiranMurid?.[cls] || {hadir:'', tidakHadir:''};
                                                    return (
                                                        <div key={cls} className="bg-white p-2 rounded-xl border border-blue-100 shadow-sm">
                                                            <p className="text-[10px] font-bold text-blue-800 uppercase mb-1 truncate">{cls}</p>
                                                            <div className="flex gap-1">
                                                                <input type="number" placeholder="H" className="w-1/2 p-1 text-center bg-green-50 text-green-700 text-xs font-bold rounded" value={k.hadir} onChange={(e) => updateData(cls, { ...k, hadir: e.target.value }, 'kehadiranMurid', cls)} />
                                                                <input type="number" placeholder="TH" className="w-1/2 p-1 text-center bg-red-50 text-red-700 text-xs font-bold rounded" value={k.tidakHadir} onChange={(e) => updateData(cls, { ...k, tidakHadir: e.target.value }, 'kehadiranMurid', cls)} />
                                                            </div>
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </Card>

                                        <div className="grid md:grid-cols-2 gap-6">
                                            <Card className="bg-gradient-to-br from-rose-50 to-pink-50 border-pink-100">
                                                <SectionTitle icon={Utensils} title="Kantin" colorClass="text-rose-500" />
                                                <select className="w-full mb-2 p-2 rounded-lg border bg-white font-bold text-rose-600" value={dataMingguan[hariSemasa].kantin.kualiti} onChange={(e) => updateData('kualiti', e.target.value, 'kantin')}><option>Sangat Baik</option><option>Baik</option><option>Sederhana</option></select>
                                                <input type="text" placeholder="Catatan..." className="w-full p-2 rounded-lg border bg-white text-sm" value={dataMingguan[hariSemasa].kantin.catatan} onChange={(e) => updateData('catatan', e.target.value, 'kantin')} />
                                            </Card>
                                            <Card className="bg-gradient-to-br from-fuchsia-50 to-purple-50 border-purple-100">
                                                <SectionTitle icon={ClipboardList} title="Perhimpunan" colorClass="text-fuchsia-600" />
                                                <textarea rows="3" className="w-full p-2 rounded-lg border bg-white text-sm" placeholder="Catatan..." value={dataMingguan[hariSemasa].rumusanPerhimpunan} onChange={(e) => updateData('rumusanPerhimpunan', e.target.value)}></textarea>
                                            </Card>
                                        </div>

                                        <Card className="bg-gradient-to-br from-emerald-50 to-teal-50 border-emerald-100">
                                            <SectionTitle icon={CheckCircle} title="Kebersihan & Kawalan" colorClass="text-emerald-600" />
                                            <div className="grid grid-cols-3 gap-2 mb-2">
                                                {['tandas','kawasanSekolah','disiplin'].map((f,i)=>(<div key={i} className="bg-white p-2 rounded-lg border"><p className="text-[10px] font-bold uppercase mb-1">{f==='disiplin'?'Disiplin':f}</p><select className="w-full text-xs font-bold bg-transparent" value={dataMingguan[hariSemasa][i<2?'kebersihan':'kawalan'][f]} onChange={(e)=>updateData(f,e.target.value,i<2?'kebersihan':'kawalan')}><option>{f==='disiplin'?'Terkawal':'Bersih'}</option><option>Sederhana</option><option>{f==='disiplin'?'Bising':'Kotor'}</option></select></div>))}
                                            </div>
                                            <input type="text" placeholder="Catatan..." className="w-full p-2 rounded-lg border bg-white text-sm" value={dataMingguan[hariSemasa].kebersihan.catatan} onChange={(e) => updateData('catatan', e.target.value, 'kebersihan')} />
                                        </Card>

                                        <Card className="bg-gradient-to-br from-red-50 to-rose-50 border-red-100">
                                            <div className="flex justify-between items-center mb-2"><h3 className="font-bold text-red-600 flex items-center"><LogOut className="w-5 h-5 mr-2"/> Murid Keluar</h3><button onClick={()=>handleMurid('add')} className="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded shadow">+ Tambah</button></div>
                                            <div className="space-y-2">{dataMingguan[hariSemasa].muridKeluar.map((m,i)=>(<div key={i} className="flex gap-2 items-center bg-white p-2 rounded-lg border border-red-100"><span className="font-bold text-red-300 w-4">{i+1}</span><input name="nama" placeholder="Nama" className="flex-1 text-sm bg-transparent outline-none" value={m.nama} onChange={(e)=>handleMurid('upd',i,e)}/><input name="kelas" placeholder="Kelas" className="w-16 text-sm bg-transparent text-center" value={m.kelas} onChange={(e)=>handleMurid('upd',i,e)}/><button onClick={()=>handleMurid('del',i)} className="text-red-400"><Trash2 className="w-4 h-4"/></button></div>))}</div>
                                        </Card>

                                        <Card>
                                            <SectionTitle icon={AlertCircle} title="Tindakan & Pengesahan" colorClass="text-blue-600" />
                                            <textarea rows="2" className="w-full p-3 rounded-xl bg-blue-50 border border-blue-100 text-sm mb-4" placeholder="Tindakan diambil..." value={dataMingguan[hariSemasa].tindakan} onChange={(e) => updateData('tindakan', e.target.value)}></textarea>
                                            <div className="flex justify-between text-center gap-4"><div className="flex-1"><select className="w-full p-2 rounded bg-gray-100 text-sm mb-1" onChange={(e)=>updateData('pelapor',e.target.value)} value={dataMingguan[hariSemasa].pelapor}><option value="">-- Pelapor --</option>{dataMingguan[hariSemasa].guruBertugas.filter(Boolean).map((g,i)=><option key={i}>{g}</option>)}</select><p className="text-[10px] uppercase text-gray-400">Disediakan Oleh</p></div><div className="flex-1"><div className="h-9 mb-1 border-b border-dashed flex items-end justify-center text-xs text-gray-300">Tandatangan</div><p className="text-xs font-bold">{dataMingguan[hariSemasa].jawatanPentadbir||"Pentadbir"}</p><p className="text-[10px] uppercase text-gray-400">Disahkan Oleh</p></div></div>
                                        </Card>

                                        <div className="flex justify-end print-hidden"><button onClick={handleSimpan} className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg flex items-center"><Save className="w-5 h-5 mr-2" /> Simpan</button></div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* --- TAB MINGGUAN --- */}
                        {activeTab === 'mingguan' && (
                            <div className="animate-fade-in-up space-y-6">
                                <Card className="bg-gradient-to-br from-green-50 to-emerald-50 border-emerald-100 text-center relative">
                                    <h2 className="text-3xl font-black text-emerald-800 uppercase mb-1">Rumusan Mingguan</h2>
                                    <div className="flex justify-center items-center gap-2 mt-2 bg-white p-2 rounded-xl inline-flex shadow-sm"><button onClick={()=>{const d=new Date(tarikh);d.setDate(d.getDate()-7);setTarikh(d.toISOString().split('T')[0])}}><ChevronLeft className="text-gray-400"/></button><span className="font-bold text-gray-700">{tarikh}</span><button onClick={()=>{const d=new Date(tarikh);d.setDate(d.getDate()+7);setTarikh(d.toISOString().split('T')[0])}}><ChevronRight className="text-gray-400"/></button></div>
                                </Card>

                                <div className="grid md:grid-cols-4 gap-4">
                                    <StatCard title="Guru TH" value={weekly.totalAbsent} subtext="Minggu Ini" icon={Users} colorClass="text-rose-600"><SimpleBarChart data={weekly.dailyAbsent} labels={['I','S','R','K','J']} color="bg-rose-400" /></StatCard>
                                    <StatCard title="Kehadiran Murid" value={`${weekly.peratusMurid}%`} subtext="Purata Mingguan" icon={GraduationCap} colorClass="text-blue-600">
                                        <div className="mt-4">
                                            <p className="text-[10px] text-gray-400 mb-1 font-semibold uppercase">Trend Harian</p>
                                            <SimpleBarChart data={weekly.dailyStudentPercent} labels={['I','S','R','K','J']} color="bg-blue-400" />
                                        </div>
                                    </StatCard>
                                    <StatCard title="Skor Bersih" value={weekly.avgCleanliness} subtext="/ 3.0" icon={MapPin} colorClass="text-emerald-600"><div className="flex justify-center py-2"><SimpleDonutChart percentage={weekly.cleanPercent} label={`${Math.round(weekly.cleanPercent)}%`} color="text-emerald-500" /></div></StatCard>
                                    <StatCard title="Isu Disiplin" value={weekly.totalIssues} subtext="Kes" icon={ShieldCheck} colorClass="text-amber-600"><div className="flex-1 flex items-center justify-center font-bold text-sm text-amber-700">{weekly.totalIssues===0?"TIADA":"ADA ISU"}</div></StatCard>
                                </div>

                                <Card className="p-0 overflow-hidden">
                                    <div className="p-4 bg-gray-50 border-b"><h4 className="font-bold text-gray-700">Perincian Harian</h4></div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-white text-gray-400 uppercase text-xs font-bold border-b"><tr><th className="p-4">Hari</th><th className="p-4">Tarikh</th><th className="p-4 text-center">Guru TH</th><th className="p-4">Isu Utama</th><th className="p-4">Tindakan</th></tr></thead>
                                            <tbody className="divide-y divide-gray-50">
                                                {['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'].map(d => (
                                                    <tr key={d} className="hover:bg-purple-50/50">
                                                        <td className="p-4 font-bold text-purple-900">{d}</td>
                                                        <td className="p-4 text-xs font-mono text-gray-500">{dataMingguan[d].tarikh || '-'}</td>
                                                        <td className="p-4 text-center font-bold text-red-500">{dataMingguan[d].kehadiranGuru.tidakHadir || '-'}</td>
                                                        <td className="p-4 text-gray-600 line-clamp-2">{dataMingguan[d].rumusanPerhimpunan || dataMingguan[d].kebersihan.catatan || '-'}</td>
                                                        <td className="p-4 text-blue-500 italic">{dataMingguan[d].tindakan || '-'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* --- TAB BULANAN --- */}
                        {activeTab === 'bulanan' && (
                            <div className="animate-fade-in-up space-y-6">
                                <Card className="bg-gradient-to-br from-purple-50 to-fuchsia-50 border-fuchsia-100 text-center">
                                    <h2 className="text-3xl font-black text-fuchsia-900 uppercase mb-2">Laporan Bulanan</h2>
                                    <div className="flex justify-center gap-3">
                                        <select className="p-2 rounded-xl bg-white border-none shadow-sm font-bold text-gray-700" value={bulanPilihan} onChange={e=>setBulanPilihan(parseInt(e.target.value))}>{MONTHS.map((b,i)=><option key={i} value={i}>{b}</option>)}</select>
                                        <select className="p-2 rounded-xl bg-white border-none shadow-sm font-bold text-gray-700" value={tahunPilihan} onChange={e=>setTahunPilihan(parseInt(e.target.value))}><option>2024</option><option>2025</option><option>2026</option></select>
                                    </div>
                                </Card>
                                
                                <div className="grid md:grid-cols-3 gap-6">
                                    <StatCard title="Kehadiran Murid" value={`${weekly.peratusMurid}%`} subtext={`Purata Bulan ${MONTHS[bulanPilihan]}`} icon={GraduationCap} colorClass="text-blue-600"><SimpleBarChart data={[88, 92, 90, parseFloat(weekly.peratusMurid)]} labels={['M1','M2','M3','M4']} color="bg-blue-400" /></StatCard>
                                    <StatCard title="Statistik Guru" value={`${stats.monthly.peratusHadir}%`} subtext={`Hadir (${stats.monthly.peratusTidakHadir}% Tidak Hadir)`} icon={Users} colorClass="text-purple-600">
                                        <div className="mt-2">
                                            <p className="text-[10px] font-bold text-gray-400 mb-1 uppercase">Trend Mingguan</p>
                                            <SimpleBarChart data={[95, 92, 94, parseFloat(stats.monthly.peratusHadir)]} labels={['M1', 'M2', 'M3', 'M4']} color="bg-purple-400" />
                                        </div>
                                    </StatCard>
                                    <StatCard title="Gred Kebersihan" value="A" subtext="Cemerlang" icon={CheckCircle} colorClass="text-emerald-600"><div className="flex justify-center py-2"><SimpleDonutChart percentage={95} label="95%" color="text-emerald-500" /></div></StatCard>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LaporanBertugas />);
    </script>
</body>
</html>
