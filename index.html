                                                                <div className="p-3 bg-emerald-50 border-b border-emerald-100 flex justify-between items-center">
                                                                    <div className="flex items-center">
                                                                        <Shield className="w-5 h-5 text-emerald-600 mr-2"/>
                                                                        <h4 className="font-bold text-emerald-800 text-sm uppercase">Isu Keselamatan Mingguan</h4>
                                                                    </div>
                                                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-full uppercase ${gredKes.c}`}>
                                                                        {gredKes.l}
                                                                    </span>
                                                                </div>
                                                                <div className="p-4 bg-white/50">
                                                                    {allKeselamatan.length === 0 ? (
                                                                        <p className="text-sm text-emerald-600/70 italic text-center py-4">Semua komponen terkawal.</p>
                                                                    ) : (
                                                                        <ul className="space-y-3">
                                                                            {allKeselamatan.map((isu, idx) => (
                                                                                <li key={idx} className="bg-white border border-emerald-100 p-3 rounded-xl shadow-sm text-sm">
                                                                                    <div className="flex justify-between items-start mb-1">
                                                                                        <span className="font-bold text-gray-800 uppercase">{isu.komponen}</span>
                                                                                        <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded uppercase">{isu.hari}</span>
                                                                                    </div>
                                                                                    {isu.jenis === 'Isu' ? (
                                                                                        <p className="text-red-500 text-xs font-bold mt-1">Status: TIDAK TERKAWAL</p>
                                                                                    ) : (
                                                                                        <p className="text-gray-600 text-xs mt-1 border-t border-dashed border-emerald-200 pt-1.5">{isu.catatan}</p>
                                                                                    )}
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    )}
                                                                </div>
                                                            </Card>

                                                            <Card className="p-0 overflow-hidden border-green-200 shadow-md">
                                                                <div className="p-3 bg-green-50 border-b border-green-100 flex justify-between items-center">
                                                                    <div className="flex items-center">
                                                                        <MapPin className="w-5 h-5 text-green-600 mr-2"/>
                                                                        <h4 className="font-bold text-green-800 text-sm uppercase">Isu Persekitaran Mingguan</h4>
                                                                    </div>
                                                                    <span className={`text-[10px] font-bold px-2 py-1 rounded-full uppercase ${gredPer.c}`}>
                                                                        {gredPer.l}
                                                                    </span>
                                                                </div>
                                                                <div className="p-4 bg-white/50">
                                                                    {allPersekitaran.length === 0 ? (
                                                                        <p className="text-sm text-green-600/70 italic text-center py-4">Semua komponen memuaskan.</p>
                                                                    ) : (
                                                                        <ul className="space-y-3">
                                                                            {allPersekitaran.map((isu, idx) => (
                                                                                <li key={idx} className="bg-white border border-green-100 p-3 rounded-xl shadow-sm text-sm">
                                                                                    <div className="flex justify-between items-start mb-1">
                                                                                        <span className="font-bold text-gray-800 uppercase">{isu.komponen}</span>
                                                                                        <span className="text-[10px] font-bold bg-green-100 text-green-700 px-2 py-0.5 rounded uppercase">{isu.hari}</span>
                                                                                    </div>
                                                                                    {isu.jenis === 'Isu' ? (
                                                                                        <p className="text-red-500 text-xs font-bold mt-1">Status: TIDAK MEMUASKAN</p>
                                                                                    ) : (
                                                                                        <p className="text-gray-600 text-xs mt-1 border-t border-dashed border-green-200 pt-1.5">{isu.catatan}</p>
                                                                                    )}
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    )}
                                                                </div>
                                                            </Card>
                                                        </div>

                                                        <Card className="p-0 overflow-hidden border-gray-200 shadow-md">
                                                            <div className="p-3 bg-gray-50 border-b border-gray-100 flex items-center">
                                                                <Briefcase className="w-5 h-5 text-gray-600 mr-2"/>
                                                                <h4 className="font-bold text-gray-800 text-sm uppercase">Rekod Pelawat Mingguan</h4>
                                                            </div>
                                                            <div className="p-4 bg-white/50">
                                                                {allPelawat.length === 0 ? (
                                                                    <p className="text-sm text-gray-400 italic text-center py-4">Tiada pelawat direkodkan minggu ini.</p>
                                                                ) : (
                                                                    <div className="overflow-x-auto">
                                                                        <table className="w-full text-left border-collapse text-xs sm:text-sm">
                                                                            <thead>
                                                                                <tr className="border-b border-gray-300 text-gray-600">
                                                                                    <th className="pb-2 font-bold w-20">Hari</th>
                                                                                    <th className="pb-2 font-bold">Nama</th>
                                                                                    <th className="pb-2 font-bold">Agensi</th>
                                                                                    <th className="pb-2 font-bold">Tujuan</th>
                                                                                </tr>
                                                                            </thead>
                                                                            <tbody>
                                                                                {allPelawat.map((p, idx) => (
                                                                                    <tr key={idx} className="border-b border-gray-100 last:border-0 hover:bg-gray-50">
                                                                                        <td className="py-2 pr-2 font-bold text-gray-500 uppercase text-[10px]">{p.hari}</td>
                                                                                        <td className="py-2 pr-2 font-semibold uppercase">{p.nama || '-'}</td>
                                                                                        <td className="py-2 pr-2 uppercase">{p.agensi || '-'}</td>
                                                                                        <td className="py-2 uppercase">{p.tujuan || '-'}</td>
                                                                                    </tr>
                                                                                ))}
                                                                            </tbody>
                                                                        </table>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </Card>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}

                                    {/* TAB BULANAN */}
                                    {activeTab === 'bulanan' && (
                                        <div className="animate-fade-in-up space-y-6">
                                            <Card className="bg-gradient-to-br from-purple-50 to-fuchsia-50 border-fuchsia-100 text-center">
                                                <h2 className="text-3xl font-black text-fuchsia-900 uppercase mb-2">Laporan Bulanan</h2>
                                                <div className="flex justify-center gap-3">
                                                    <select className="p-2 rounded-xl bg-white border-none shadow-sm font-bold text-gray-700" value={bulanPilihan} onChange={e => setBulanPilihan(parseInt(e.target.value))}>
                                                        {MONTHS.map((b,i) => <option key={i} value={i}>{b}</option>)}
                                                    </select>
                                                    <select className="p-2 rounded-xl bg-white border-none shadow-sm font-bold text-gray-700" value={tahunPilihan} onChange={e => setTahunPilihan(parseInt(e.target.value))}>
                                                        <option>2024</option><option>2025</option><option>2026</option>
                                                    </select>
                                                </div>
                                            </Card>
                                            
                                            <div className="grid md:grid-cols-3 gap-6">
                                                <StatCard title="Statistik Guru" value={`${monthlyStats.peratusGuruHadir}%`} subtext={`Hadir (${monthlyStats.peratusGuruTidakHadir}% Tidak Hadir)`} icon={Users} colorClass="text-purple-600">
                                                    <div className="mt-2">
                                                        <p className="text-[10px] font-bold text-gray-400 mb-1 uppercase">Trend Mingguan (M1-M4)</p>
                                                        <SimpleBarChart data={monthlyStats.guruTrend} labels={['M1', 'M2', 'M3', 'M4']} color="bg-purple-400" />
                                                    </div>
                                                </StatCard>
                                                <StatCard title="Isu Disiplin" value={monthlyStats.totalDisiplin} subtext={`Kes Bulan ${MONTHS[bulanPilihan]}`} icon={AlertTriangle} colorClass="text-amber-600">
                                                    <div className="mt-2">
                                                        <p className="text-[10px] font-bold text-gray-400 mb-1 uppercase">Trend Mingguan (M1-M4)</p>
                                                        <SimpleBarChart data={monthlyStats.disiplinTrend} labels={['M1','M2','M3','M4']} color="bg-amber-400" />
                                                    </div>
                                                </StatCard>
                                                <StatCard title="Murid Keluar Awal" value={monthlyStats.totalKeluarAwal} subtext={`Murid Bulan ${MONTHS[bulanPilihan]}`} icon={LogOut} colorClass="text-rose-600">
                                                    <div className="mt-2">
                                                        <p className="text-[10px] font-bold text-gray-400 mb-1 uppercase">Trend Mingguan (M1-M4)</p>
                                                        <SimpleBarChart data={monthlyStats.keluarAwalTrend} labels={['M1','M2','M3','M4']} color="bg-rose-400" />
                                                    </div>
                                                </StatCard>
                                            </div>

                                            {(() => {
                                                const allKeselamatanBln = [], allPersekitaranBln = [];
                                                
                                                Object.keys(laporanAwan).sort((a,b) => new Date(b) - new Date(a)).forEach(dateStr => {
                                                    const d = new Date(dateStr);
                                                    if (d.getMonth() === bulanPilihan && d.getFullYear() === tahunPilihan) {
                                                        const dayData = laporanAwan[dateStr];
                                                        if (dayData.pelapor && !dayData.cutiUmum) {
                                                            if (dayData.keselamatan) {
                                                                Object.entries(KOMPONEN_KESELAMATAN).forEach(([k, label]) => {
                                                                    const status = typeof dayData.keselamatan[k] === 'object' ? dayData.keselamatan[k].status : dayData.keselamatan[k];
                                                                    if (status === 'Tidak Terkawal' || status === 'Tidak Selamat' || status === 'Sederhana') {
                                                                        allKeselamatanBln.push({ tarikh: dateStr, komponen: label, jenis: 'Isu' });
                                                                    }
                                                                });
                                                                if (dayData.keselamatan.catatan) {
                                                                    allKeselamatanBln.push({ tarikh: dateStr, komponen: 'Catatan Keselamatan', catatan: dayData.keselamatan.catatan });
                                                                }
                                                            }
                                                            if (dayData.persekitaran) {
                                                                Object.entries(KOMPONEN_PERSEKITARAN).forEach(([k, label]) => {
                                                                    if (dayData.persekitaran[k] === 'Tidak Memuaskan') {
                                                                        allPersekitaranBln.push({ tarikh: dateStr, komponen: label, jenis: 'Isu' });
                                                                    }
                                                                });
                                                                if (dayData.persekitaran.catatan) {
                                                                    allPersekitaranBln.push({ tarikh: dateStr, komponen: 'Catatan Persekitaran', catatan: dayData.persekitaran.catatan });
                                                                }
                                                            }
                                                        }
                                                    }
                                                });

                                                return (
                                                    <div className="grid md:grid-cols-2 gap-6 mt-6 print:break-inside-avoid">
                                                        <Card className="p-0 overflow-hidden border-emerald-200 shadow-md">
                                                            <div className="p-3 bg-emerald-50 border-b border-emerald-100 flex items-center">
                                                                <Shield className="w-5 h-5 text-emerald-600 mr-2"/>
                                                                <h4 className="font-bold text-emerald-800 text-sm uppercase">Isu Keselamatan Bulanan</h4>
                                                            </div>
                                                            <div className="p-4 bg-white/50">
                                                                {allKeselamatanBln.length === 0 ? (
                                                                    <p className="text-sm text-emerald-600/70 italic text-center py-4">Semua komponen terkawal untuk bulan ini.</p>
                                                                ) : (
                                                                    <ul className="space-y-3">
                                                                        {allKeselamatanBln.map((isu, idx) => (
                                                                            <li key={idx} className="bg-white border border-emerald-100 p-3 rounded-xl shadow-sm text-sm">
                                                                                <div className="flex justify-between items-start mb-1">
                                                                                    <span className="font-bold text-gray-800 uppercase">{isu.komponen}</span>
                                                                                    <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded uppercase">{isu.tarikh}</span>
                                                                                </div>
                                                                                {isu.jenis === 'Isu' ? (
                                                                                    <p className="text-red-500 text-xs font-bold mt-1">Status: TIDAK TERKAWAL</p>
                                                                                ) : (
                                                                                    <p className="text-gray-600 text-xs mt-1 border-t border-dashed border-emerald-200 pt-1.5">{isu.catatan}</p>
                                                                                )}
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                )}
                                                            </div>
                                                        </Card>

                                                        <Card className="p-0 overflow-hidden border-green-200 shadow-md">
                                                            <div className="p-3 bg-green-50 border-b border-green-100 flex items-center">
                                                                <MapPin className="w-5 h-5 text-green-600 mr-2"/>
                                                                <h4 className="font-bold text-green-800 text-sm uppercase">Isu Persekitaran Bulanan</h4>
                                                            </div>
                                                            <div className="p-4 bg-white/50">
                                                                {allPersekitaranBln.length === 0 ? (
                                                                    <p className="text-sm text-green-600/70 italic text-center py-4">Semua komponen memuaskan untuk bulan ini.</p>
                                                                ) : (
                                                                    <ul className="space-y-3">
                                                                        {allPersekitaranBln.map((isu, idx) => (
                                                                            <li key={idx} className="bg-white border border-green-100 p-3 rounded-xl shadow-sm text-sm">
                                                                                <div className="flex justify-between items-start mb-1">
                                                                                    <span className="font-bold text-gray-800 uppercase">{isu.komponen}</span>
                                                                                    <span className="text-[10px] font-bold bg-green-100 text-green-700 px-2 py-0.5 rounded uppercase">{isu.tarikh}</span>
                                                                                </div>
                                                                                {isu.jenis === 'Isu' ? (
                                                                                    <p className="text-red-500 text-xs font-bold mt-1">Status: TIDAK MEMUASKAN</p>
                                                                                ) : (
                                                                                    <p className="text-gray-600 text-xs mt-1 border-t border-dashed border-green-200 pt-1.5">{isu.catatan}</p>
                                                                                )}
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                )}
                                                            </div>
                                                        </Card>
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LaporanBertugas />);
    </script>
</body>
</html>
