<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Laporan Bertugas SK Simpang Empat</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons (Vanilla) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9fafb; 
        }
        .animate-fade-in-up { 
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Layout untuk Kertas A4 Preview */
        .a4-paper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            padding: 15mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            color: black;
        }

        @media print { 
            @page { margin: 12mm; size: A4 portrait; } 
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; } 
            .print-hidden { display: none !important; } 
            .a4-paper { 
                width: 100%; 
                min-height: auto; 
                padding: 0; 
                box-shadow: none; 
                margin: 0; 
            }
            table { page-break-inside: auto; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
            /* Kelas utiliti khas untuk cetakan 2 muka surat */
            .page-break { page-break-before: always; margin-top: 10mm; }
            .avoid-break { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- ICONS SETUP ---
        const IconWrapper = ({ name, className, ...props }) => {
            const iconData = lucide.icons[name];
            if (!iconData) return null;
            return React.createElement('svg', {
                xmlns: "http://www.w3.org/2000/svg", width: 24, height: 24, viewBox: "0 0 24 24",
                fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                className: className, ...props,
                dangerouslySetInnerHTML: { __html: iconData.map(child => {
                    const [tag, attrs] = child;
                    const attrString = Object.entries(attrs).map(([key, val]) => `${key}="${val}"`).join(' ');
                    return `<${tag} ${attrString}></${tag}>`;
                }).join('') }
            });
        };
        const createIcon = (name) => (props) => <IconWrapper name={name} {...props} />;
        
        // Icons List
        const ClipboardList = createIcon('ClipboardList'); 
        const Users = createIcon('Users');
        const Utensils = createIcon('Utensils'); 
        const UserCheck = createIcon('UserCheck'); 
        const LogOut = createIcon('LogOut');
        const Printer = createIcon('Printer'); 
        const CheckCircle = createIcon('CheckCircle');
        const Calendar = createIcon('Calendar'); 
        const BarChart3 = createIcon('BarChart3');
        const FileText = createIcon('FileText'); 
        const UserCog = createIcon('UserCog');
        const AlertTriangle = createIcon('AlertTriangle'); 
        const Save = createIcon('Save');
        const AlertCircle = createIcon('AlertCircle'); 
        const ChevronLeft = createIcon('ChevronLeft'); 
        const ChevronRight = createIcon('ChevronRight'); 
        const ShieldCheck = createIcon('ShieldCheck'); 
        const MapPin = createIcon('MapPin');
        const Trash2 = createIcon('Trash2'); 
        const Activity = createIcon('Activity');
        const Check = createIcon('Check'); 
        const X = createIcon('X'); 
        const Shield = createIcon('Shield'); 
        const Key = createIcon('Key');
        const Database = createIcon('Database'); 
        const Download = createIcon('Download');
        const FileEdit = createIcon('FileEdit'); 
        const Lock = createIcon('Lock');
        const Briefcase = createIcon('Briefcase');

        // --- DATA PEMALAR ---
        const CLASSES = ['PRA CEMERLANG', 'PRA GEMILANG', '1 SETIA', '1 IKHLAS', '2 MAJU', '2 PERKASA', '3 NAIM', '3 AKTIF', '4 GIGIH', '4 EHSAN', '5 MAHIR', '5 PINTAR', '6 ARIF', '6 TEKUN', 'PPKI ADN', 'PPKI FIRDAUS', 'PPKI MAWA', 'PPKI RAYYAN'];
        const MONTHS = ["Januari", "Februari", "Mac", "April", "Mei", "Jun", "Julai", "Ogos", "September", "Oktober", "November", "Disember"];

        const KOMPONEN_KESELAMATAN = {
            pintuUtama: 'Pintu Pagar Utama',
            pintuKedua: 'Pintu Pagar Kedua',
            blokA: 'Bangunan Blok A',
            blokB: 'Bangunan Blok B',
            blokC: 'Bangunan Blok C',
            ppki: 'Bangunan PPKI',
            kantin: 'Bangunan Kantin'
        };

        const KOMPONEN_PERSEKITARAN = {
            tandasGuruL: 'Tandas Guru Lelaki',
            tandasGuruP: 'Tandas Guru Perempuan',
            tandasMuridL: 'Tandas Murid Lelaki',
            tandasMuridP: 'Tandas Murid Perempuan',
            kelas: 'Kebersihan Kelas Secara Umum',
            keceriaan: 'Keceriaan Sekolah',
            bilikKhas: 'Bilik-Bilik Khas',
            longkang: 'Kebersihan Longkang',
            kakiLima: 'Kebersihan Kaki Lima Bangunan',
            pejabat: 'Kebersihan Pejabat',
            kantin: 'Kebersihan Kantin',
            ppki: 'Kebersihan Bangunan PPKI'
        };

        const SENARAI_PENTADBIR_ASAL = [
            "EN. AHMAD BIN ALI (GURU BESAR)", 
            "PN. SITI BINTI ABU (PK PENTADBIRAN)", 
            "EN. RAMLI BIN SAAD (PK HEM)",
            "PN. FATIMAH BINTI OMAR (PK KOKURIKULUM)", 
            "EN. YUSOF BIN ISHAK (PK PPKI)"
        ];

        const SENARAI_GURU_ASAL = [
            "CIK NURUL AIN BINTI HASSAN", "EN. MOHD FAIZAL BIN IBRAHIM", "PN. ROSLINA BINTI MAHMUD",
            "EN. KHAIRUL ANUAR BIN ZAINAL", "PN. AZIZAH BINTI ABDULLAH", "CIK FARAH NADIA BINTI OTHMAN",
            "EN. SYED SYAHMI BIN SYED OMAR", "PN. NORHAYATI BINTI SALIM", "EN. ZAMRI BIN YAHYA",
            "PN. HALIMAH BINTI KASSIM", "EN. AMIRUL MUKMININ BIN RASHID", "PN. ZURAIDAH BINTI MANSOR",
            "CIK INTAN SYAFINAZ BINTI AZMI", "EN. ROSLI BIN BAKAR", "PN. MARDIANA BINTI JUSOH",
            "EN. ABU BAKAR BIN OMAR", "PN. KALSOM BINTI MAJID", "EN. MUHAMMAD BIN HARUN"
        ];

        const getTodayLocal = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // --- KOMPONEN UI ---
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white/90 backdrop-blur-sm rounded-3xl shadow-xl border-2 border-white/50 p-6 transition-all hover:shadow-2xl ${className} print-hidden`}>
                {children}
            </div>
        );

        const SectionTitle = ({ icon: Icon, title, colorClass = "text-purple-600" }) => (
            <h3 className={`flex items-center text-lg font-bold mb-4 print-text-black border-b-2 border-dashed border-gray-200 pb-2 ${colorClass}`}>
                <Icon className={`w-6 h-6 mr-2 ${colorClass}`} /> {title}
            </h3>
        );

        const NavButton = ({ active, onClick, icon: Icon, label }) => (
            <button 
                onClick={onClick} 
                className={`flex-1 flex items-center justify-center px-4 py-3 rounded-2xl font-bold transition-all transform ${active ? 'bg-white text-purple-700 shadow-lg scale-105 ring-4 ring-purple-200' : 'bg-white/20 text-white hover:bg-white/30 hover:scale-105'}`}
            >
                <Icon className="w-5 h-5 mr-2" /> {label}
            </button>
        );

        const StatCard = ({ title, value, subtext, icon: Icon, colorClass, children }) => (
            <Card className="flex flex-col justify-between h-full border-t-4 border-t-current" style={{ borderColor: colorClass.includes('text-') ? undefined : '' }}>
                <div className={`flex justify-between items-start mb-2 ${colorClass.includes('border') ? '' : 'border-t-0'}`} style={{ borderColor: 'inherit' }}>
                    <div>
                        <p className="text-xs font-bold uppercase tracking-wider text-gray-400">{title}</p>
                        <h4 className={`text-4xl font-black mt-2 ${colorClass}`}>{value}</h4>
                        {subtext && <span className="text-xs font-medium text-gray-400">{subtext}</span>}
                    </div>
                    <div className={`p-3 rounded-2xl bg-gray-50 ${colorClass.replace('text-', 'bg-').replace('600', '100').replace('500', '100')}`}>
                        <Icon className="w-6 h-6" />
                    </div>
                </div>
                {children}
            </Card>
        );

        const SimpleBarChart = ({ data, labels, color = "bg-purple-400" }) => {
            const safeData = Array.isArray(data) ? data.map(n => isNaN(parseInt(n)) ? 0 : parseInt(n)) : [0, 0, 0, 0, 0];
            const max = Math.max(...safeData, 1);
            return (
                <div className="flex items-end space-x-2 h-24 w-full pt-6">
                    {safeData.map((v, i) => {
                        const hPct = Math.max((v / Math.max(max, 1)) * 100, 5); 
                        return (
                            <div key={i} className="flex-1 flex flex-col items-center justify-end group relative h-full">
                                <div className="absolute -top-6 opacity-0 group-hover:opacity-100 bg-gray-800 text-white text-[10px] rounded px-2 py-1 font-bold mb-1 transition-opacity z-10">{v}</div>
                                <div className="w-full flex-1 flex items-end">
                                    <div className={`w-full rounded-t-xl transition-all duration-700 ${color} opacity-80 group-hover:opacity-100`} style={{ height: `${hPct}%` }}></div>
                                </div>
                                <span className="text-[10px] font-bold text-gray-400 mt-2">{labels[i]}</span>
                            </div>
                        );
                    })}
                </div>
            );
        };

        const SimpleDonutChart = ({ percentage, color = "text-pink-500", label }) => {
            const safePercent = isNaN(percentage) ? 0 : Math.min(Math.max(percentage, 0), 100);
            const r = 30, c = 2 * Math.PI * r, off = c - (safePercent / 100) * c;
            return (
                <div className="relative flex items-center justify-center">
                    <svg height="80" width="80" className="transform -rotate-90">
                        <circle stroke="#f3e8ff" strokeWidth="8" fill="transparent" r={r} cx="40" cy="40"/>
                        <circle className={`${color} transition-all duration-1000`} stroke="currentColor" strokeWidth="8" strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round" fill="transparent" r={r} cx="40" cy="40"/>
                    </svg>
                    <span className="absolute text-sm font-black text-gray-700">{label}</span>
                </div>
            );
        };

        // --- KOMPONEN UTAMA ---
        const LaporanBertugas = () => {
            const [activeTab, setActiveTab] = React.useState('harian');
            const [tarikh, setTarikh] = React.useState(getTodayLocal());
            const [toast, setToast] = React.useState({ show: false, message: '' });
            const [bulanPilihan, setBulanPilihan] = React.useState(new Date().getMonth());
            const [tahunPilihan, setTahunPilihan] = React.useState(new Date().getFullYear());
            const [loading, setLoading] = React.useState(false);
            
            const [laporanAwan, setLaporanAwan] = React.useState({});
            const [isEditingMod, setIsEditingMod] = React.useState(true);
            const forceEditRef = React.useRef(false);

            const [senaraiPentadbir, setSenaraiPentadbir] = React.useState(SENARAI_PENTADBIR_ASAL);
            const [senaraiGuru, setSenaraiGuru] = React.useState(SENARAI_GURU_ASAL);
            
            const URL_GAS_SENARAI_NAMA = "https://script.google.com/macros/s/AKfycbwbe4ZKwFQPMvJTGD-fawtZvsybG-ekJ692aFNmaMgWZcpRIrjle2g_UTXTjkzLhyg5tQ/exec"; 
            const URL_GAS_SIMPAN_DATA = "https://script.google.com/macros/s/AKfycbwbe4ZKwFQPMvJTGD-fawtZvsybG-ekJ692aFNmaMgWZcpRIrjle2g_UTXTjkzLhyg5tQ/exec";

            const syncCloudData = (isManual = false) => {
                if (URL_GAS_SENARAI_NAMA && URL_GAS_SENARAI_NAMA !== "") {
                    if (isManual) setLoading(true);
                    const fetchUrl = `${URL_GAS_SENARAI_NAMA}?t=${new Date().getTime()}`;
                    
                    fetch(fetchUrl, { redirect: 'follow' })
                        .then(res => {
                            const contentType = res.headers.get("content-type");
                            if (contentType && contentType.indexOf("application/json") !== -1) return res.json();
                            else throw new Error("Format tidak disokong.");
                        })
                        .then(data => {
                            let berjayaTarik = false;
                            if (data && data.pentadbir && data.pentadbir.length > 0) { setSenaraiPentadbir(data.pentadbir); berjayaTarik = true; }
                            if (data && data.guru && data.guru.length > 0) { setSenaraiGuru(data.guru); berjayaTarik = true; }
                            
                            if (data && data.laporan && data.laporan.length > 0) {
                                const newData = {};
                                data.laporan.forEach(cloudItem => { if (cloudItem && cloudItem.tarikh) newData[cloudItem.tarikh] = cloudItem; });
                                setLaporanAwan(newData);
                            }
                            
                            if (isManual) { setToast({ show: true, message: 'Data berjaya ditarik dari Awan!' }); setTimeout(() => setToast({ show: false, message: '' }), 3000); } 
                            else if (berjayaTarik) console.log("Data awan berjaya ditarik automatik.");
                        })
                        .catch(err => {
                            console.error("Ralat Sync:", err);
                            if (isManual) { setToast({ show: true, message: 'Gagal segerak data dari awan.' }); setTimeout(() => setToast({ show: false, message: '' }), 4000); }
                        })
                        .finally(() => { if (isManual) setLoading(false); });
                }
            };

            React.useEffect(() => { syncCloudData(false); }, []);

            const [showAdminLogin, setShowAdminLogin] = React.useState(false);
            const [adminPwdInput, setAdminPwdInput] = React.useState('');
            const [isAdmin, setIsAdmin] = React.useState(false);
            const [adminPrintDate, setAdminPrintDate] = React.useState(getTodayLocal());
            const [printMode, setPrintMode] = React.useState(false);
            const [showHarianPreview, setShowHarianPreview] = React.useState(false);
            const [previewData, setPreviewData] = React.useState(null);

            const defaultLaporan = { 
                tarikh: '', 
                cutiUmum: false,
                namaCuti: '',
                pentadbir: '', 
                jawatanPentadbir: '', 
                guruBertugas: Array(6).fill(''), 
                rumusanPerhimpunan: '', 
                kantin: { kualiti: 'Baik', menu: '', catatan: '' }, 
                keselamatan: { pintuUtama: '', pintuKedua: '', blokA: '', blokB: '', blokC: '', ppki: '', kantin: '', catatan: '' }, 
                persekitaran: { tandasGuruL: '', tandasGuruP: '', tandasMuridL: '', tandasMuridP: '', kelas: '', keceriaan: '', bilikKhas: '', longkang: '', kakiLima: '', pejabat: '', kantin: '', ppki: '', catatan: '' },
                isuDisiplin: [], 
                kehadiranGuru: { hadir: '', tidakHadir: '', sebab: '' }, 
                kehadiranStaf: { hadir: '', tidakHadir: '', sebab: '' }, 
                muridKeluar: [], 
                pelawat: [], 
                pelapor: '', 
                tindakan: '',
                disahkanAdmin: false
            };
            
            const [dataMingguan, setDataMingguan] = React.useState({ Isnin: {...defaultLaporan}, Selasa: {...defaultLaporan}, Rabu: {...defaultLaporan}, Khamis: {...defaultLaporan}, Jumaat: {...defaultLaporan} });

            const [monthlyStats, setMonthlyStats] = React.useState({ peratusGuruHadir: '0.0', peratusGuruTidakHadir: '0.0', guruTrend: [0, 0, 0, 0], totalDisiplin: 0, totalKeluarAwal: 0, disiplinTrend: [0, 0, 0, 0], keluarAwalTrend: [0, 0, 0, 0] });

            const getWeekDates = (dateString) => {
                const curr = new Date(dateString);
                const diffToMon = curr.getDay() === 0 ? -6 : 1 - curr.getDay();
                const monday = new Date(curr);
                monday.setDate(curr.getDate() + diffToMon);
                
                let weekDates = {};
                const daysMap = ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'];
                for(let i=0; i<5; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    weekDates[daysMap[i]] = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                }
                return weekDates;
            };

            const currentWeekDates = getWeekDates(tarikh);

            const loadDataAwan = () => {
                setLoading(true);
                const weekDates = getWeekDates(tarikh);
                try {
                    const newDataMingguan = { Isnin: {...defaultLaporan}, Selasa: {...defaultLaporan}, Rabu: {...defaultLaporan}, Khamis: {...defaultLaporan}, Jumaat: {...defaultLaporan} };
                    Object.keys(weekDates).forEach(day => {
                        const dateStr = weekDates[day];
                        if (laporanAwan[dateStr]) {
                            let updatedIsuDisiplin = laporanAwan[dateStr].isuDisiplin || [];
                            if (typeof updatedIsuDisiplin === 'string') updatedIsuDisiplin = updatedIsuDisiplin.trim() !== '' ? [{ nama: '', kelas: '', isu: updatedIsuDisiplin }] : [];
                            
                            const cloudKeselamatan = laporanAwan[dateStr].keselamatan || {};
                            const updatedKeselamatan = { ...defaultLaporan.keselamatan };
                            Object.keys(defaultLaporan.keselamatan).forEach(k => {
                                if (k !== 'catatan') {
                                    if (cloudKeselamatan[k] !== undefined) {
                                        if (typeof cloudKeselamatan[k] === 'object' && cloudKeselamatan[k] !== null) {
                                            updatedKeselamatan[k] = cloudKeselamatan[k].status || '';
                                        } else if (typeof cloudKeselamatan[k] === 'string') {
                                            const v = cloudKeselamatan[k];
                                            if (v === 'Selamat') updatedKeselamatan[k] = 'Terkawal';
                                            else if (v === 'Sederhana' || v === 'Tidak Selamat') updatedKeselamatan[k] = 'Tidak Terkawal';
                                            else updatedKeselamatan[k] = v;
                                        }
                                    }
                                } else updatedKeselamatan.catatan = cloudKeselamatan.catatan || '';
                            });

                            const cloudPersekitaran = laporanAwan[dateStr].persekitaran || {};
                            const updatedPersekitaran = { ...defaultLaporan.persekitaran };
                            Object.keys(defaultLaporan.persekitaran).forEach(k => {
                                if (k !== 'catatan') {
                                    if (cloudPersekitaran[k] !== undefined) {
                                        updatedPersekitaran[k] = cloudPersekitaran[k];
                                    }
                                } else updatedPersekitaran.catatan = cloudPersekitaran.catatan || '';
                            });

                            newDataMingguan[day] = { 
                                ...defaultLaporan, 
                                ...laporanAwan[dateStr], 
                                cutiUmum: laporanAwan[dateStr].cutiUmum || false,
                                namaCuti: laporanAwan[dateStr].namaCuti || '',
                                isuDisiplin: updatedIsuDisiplin, 
                                keselamatan: updatedKeselamatan, 
                                persekitaran: updatedPersekitaran, 
                                tarikh: dateStr 
                            };
                        } else newDataMingguan[day].tarikh = dateStr;
                    });

                    if (forceEditRef.current) { setIsEditingMod(true); forceEditRef.current = false; } 
                    else setIsEditingMod(!(laporanAwan[tarikh] && laporanAwan[tarikh].pelapor && laporanAwan[tarikh].pelapor.trim() !== ""));
                    setDataMingguan(newDataMingguan);
                } catch (err) { console.error("Error loading data:", err); } 
                finally { setLoading(false); }
            };

            React.useEffect(() => { loadDataAwan(); }, [tarikh, laporanAwan]);

            React.useEffect(() => {
                if (activeTab === 'bulanan') {
                    try {
                        let tGuruHadir = 0, tGuruTidakHadir = 0;
                        let guruMinggu = [ {h:0, t:0}, {h:0, t:0}, {h:0, t:0}, {h:0, t:0}, {h:0, t:0} ];
                        let kesDisiplin = 0, kesKeluarAwal = 0;
                        let disiplinMinggu = [0, 0, 0, 0, 0], keluarAwalMinggu = [0, 0, 0, 0, 0];

                        Object.keys(laporanAwan).forEach(dateStr => {
                            const d = new Date(dateStr);
                            if (d.getMonth() === bulanPilihan && d.getFullYear() === tahunPilihan) {
                                const dayData = laporanAwan[dateStr];
                                const weekIdx = Math.min(Math.floor((d.getDate() - 1) / 7), 4);
                                
                                if (dayData.pelapor && !dayData.cutiUmum) {
                                    const gHadir = parseInt(dayData.kehadiranGuru?.hadir || 0);
                                    const gTakHadir = parseInt(dayData.kehadiranGuru?.tidakHadir || 0);
                                    tGuruHadir += gHadir; tGuruTidakHadir += gTakHadir;
                                    guruMinggu[weekIdx].h += gHadir; guruMinggu[weekIdx].t += gTakHadir;

                                    if (Array.isArray(dayData.isuDisiplin)) {
                                        const dCount = dayData.isuDisiplin.filter(isu => isu.nama || isu.isu || isu.kelas).length;
                                        kesDisiplin += dCount; disiplinMinggu[weekIdx] += dCount;
                                    }
                                    if (Array.isArray(dayData.muridKeluar)) {
                                        const kCount = dayData.muridKeluar.filter(m => m.nama || m.sebab || m.kelas).length;
                                        kesKeluarAwal += kCount; keluarAwalMinggu[weekIdx] += kCount;
                                    }
                                }
                            }
                        });
                        
                        const calcPercent = (h, t) => (h+t) > 0 ? (h/(h+t))*100 : 0;
                        const totalGuruPercent = calcPercent(tGuruHadir, tGuruTidakHadir);

                        setMonthlyStats({ peratusGuruHadir: totalGuruPercent.toFixed(1), peratusGuruTidakHadir: ((tGuruHadir+tGuruTidakHadir) > 0 ? (tGuruTidakHadir/(tGuruHadir+tGuruTidakHadir))*100 : 0).toFixed(1), guruTrend: guruMinggu.slice(0,4).map(w => Math.round(calcPercent(w.h, w.t))), totalDisiplin: kesDisiplin, totalKeluarAwal: kesKeluarAwal, disiplinTrend: disiplinMinggu.slice(0,4), keluarAwalTrend: keluarAwalMinggu.slice(0,4) });
                    } catch (err) { console.error("Error computing monthly stats", err); }
                }
            }, [activeTab, bulanPilihan, tahunPilihan, laporanAwan]);

            const hariSemasa = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'][new Date(tarikh).getDay()];
            const isWeekend = hariSemasa === 'Sabtu' || hariSemasa === 'Ahad';
            const isLaporanDisahkan = dataMingguan[hariSemasa]?.disahkanAdmin;

            const updateData = (field, val, group, subGroup) => {
                if (isWeekend) return;
                if (isLaporanDisahkan) { setToast({ show: true, message: 'Laporan ini telah disahkan oleh Pentadbir dan tidak boleh diubah.' }); setTimeout(() => setToast({ show: false, message: '' }), 3000); return; }
                setDataMingguan(prev => {
                    const h = { ...prev[hariSemasa] };
                    if (subGroup) h[group][subGroup] = { ...h[group][subGroup], [field]: val };
                    else if (group) h[group] = { ...h[group], [field]: val };
                    else h[field] = val;
                    return { ...prev, [hariSemasa]: h };
                });
            };

            const handleArrayUpdate = (type, act, idx, e) => {
                if (isLaporanDisahkan) return;
                const list = Array.isArray(dataMingguan[hariSemasa][type]) ? [...dataMingguan[hariSemasa][type]] : [];
                if (act === 'add') list.push(type === 'pelawat' ? { nama: '', agensi: '', tujuan: '' } : type === 'isuDisiplin' ? { nama: '', kelas: '', isu: '' } : { nama: '', kelas: '', masa: '', sebab: '' });
                else if (act === 'del') list.splice(idx, 1);
                else list[idx][e.target.name] = e.target.value;
                updateData(type, list);
            };

            const handleSimpan = async () => {
                setLoading(true);
                try {
                    if (URL_GAS_SIMPAN_DATA && URL_GAS_SIMPAN_DATA !== "") {
                        const dataHariIni = dataMingguan[hariSemasa];
                        try {
                            await fetch(URL_GAS_SIMPAN_DATA, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(dataHariIni) });
                            setLaporanAwan(prev => ({ ...prev, [dataHariIni.tarikh]: dataHariIni }));
                            setToast({ show: true, message: 'Berjaya Disimpan ke Google Sheets!' });
                        } catch (error) { console.error(error); setToast({ show: true, message: 'Ralat: Gagal menghubungi awan.' }); }
                    } else setToast({ show: true, message: 'Ralat: Pautan GAS tidak ditetapkan!' });

                    if (dataMingguan[hariSemasa]?.pelapor?.trim() !== "") setIsEditingMod(false);
                    setTimeout(() => setToast({ show: false, message: '' }), 3000);
                } catch (err) { console.error(err); setToast({ show: true, message: 'Gagal memproses data!' }); } 
                finally { setTimeout(() => setLoading(false), 300); }
            };
            
            // FUNGSI ADMIN
            const handleAdminLogin = () => {
                if (adminPwdInput === '123456789') { setIsAdmin(true); setShowAdminLogin(false); setAdminPwdInput(''); setToast({ show: true, message: 'Berjaya log masuk!' }); setTimeout(() => setToast({ show: false, message: '' }), 3000); } 
                else { setToast({ show: true, message: 'Kata laluan salah!' }); setTimeout(() => setToast({ show: false, message: '' }), 3000); }
            };

            const executeAdminAction = async (action, dateKey, confirmMsg, successMsg) => {
                if (window.confirm(confirmMsg)) {
                    setLoading(true);
                    try {
                        if (URL_GAS_SIMPAN_DATA) await fetch(URL_GAS_SIMPAN_DATA, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ tarikh: dateKey, action: action === 'endorse' ? 'simpan' : action, ...(action === 'endorse' && {...laporanAwan[dateKey], disahkanAdmin: true}) }) });
                        const newData = { ...laporanAwan };
                        if (action === 'endorse' && newData[dateKey]) newData[dateKey].disahkanAdmin = true;
                        else if (action === 'delete') delete newData[dateKey];
                        else if (action === 'clear_all') Object.keys(newData).forEach(k => delete newData[k]);
                        
                        setLaporanAwan(newData); setToast({ show: true, message: successMsg });
                    } catch(err) { setToast({ show: true, message: 'Ralat di Awan.' }); }
                    setTimeout(() => { setToast({ show: false, message: '' }); setLoading(false); }, 3000);
                }
            };

            const handleExportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(laporanAwan, null, 2));
                const downloadAnchorNode = document.createElement('a'); downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "skse_backup_awan_" + getTodayLocal() + ".json");
                document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove();
            };

            const handleEditHarian = (editDate) => { forceEditRef.current = true; setTarikh(editDate); setActiveTab('harian'); window.scrollTo({ top: 0, behavior: 'smooth' }); setToast({ show: true, message: `Mod kemaskini untuk ${editDate}` }); setTimeout(() => setToast({ show: false, message: '' }), 3000); };
            
            const handleAdminPrint = (type) => {
                if (type === 'harian') {
                    if (!laporanAwan[adminPrintDate] || !laporanAwan[adminPrintDate].tarikh) { setToast({ show: true, message: `Tiada rekod sah untuk ${adminPrintDate}.` }); setTimeout(() => setToast({ show: false, message: '' }), 3000); return; }
                    setPreviewData(laporanAwan[adminPrintDate]); setShowHarianPreview(true);
                } else { setTarikh(adminPrintDate); setActiveTab(type); setIsAdmin(false); setPrintMode(true); setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 100); }
            };

            const calcStats = () => {
                let tAbsent = 0, dAbsent = [], tIssues = 0;
                ['Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat'].forEach(d => {
                    const day = dataMingguan[d];
                    if (day.tarikh && !day.cutiUmum) {
                        tAbsent += parseInt(day.kehadiranGuru.tidakHadir || 0); dAbsent.push(parseInt(day.kehadiranGuru.tidakHadir || 0));
                        if (Array.isArray(day.isuDisiplin)) tIssues += day.isuDisiplin.length;
                        else if (typeof day.isuDisiplin === 'string' && day.isuDisiplin.trim() !== '') tIssues++;
                    } else dAbsent.push(0);
                });
                return { weekly: { totalAbsent: tAbsent, dailyAbsent: dAbsent, totalIssues: tIssues } };
            };

            const { weekly } = calcStats();

            return (
                <div className="min-h-screen relative">
                    {/* MODAL CETAKAN A4 (HARIAN) */}
                    {showHarianPreview && previewData && (
                        <div className="fixed inset-0 z-[300] bg-gray-900/90 overflow-y-auto print:bg-white print:static print:overflow-visible flex flex-col items-center">
                            <div className="sticky top-0 w-full bg-white p-4 shadow-lg flex justify-between items-center print-hidden z-10 border-b-4 border-blue-500">
                                <div className="flex items-center"><div className="bg-blue-100 p-2 rounded-lg mr-3"><Printer className="w-5 h-5 text-blue-600"/></div><div><h3 className="font-bold text-gray-800 text-lg">Pratonton Cetakan (A4)</h3><p className="text-xs text-gray-500">Laporan Harian: {previewData.tarikh}</p></div></div>
                                <div className="flex gap-3"><button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 transition text-white px-5 py-2.5 rounded-xl font-bold shadow-md flex items-center"><Printer className="w-5 h-5 mr-2"/> Cetak Laporan</button><button onClick={() => setShowHarianPreview(false)} className="bg-gray-200 hover:bg-gray-300 transition text-gray-800 px-5 py-2.5 rounded-xl font-bold shadow-md flex items-center"><X className="w-5 h-5 mr-2"/> Tutup</button></div>
                            </div>

                            <div className="a4-paper my-8 relative">
                                {/* Header Surat */}
                                <div className="flex items-center border-b-[3px] border-black pb-4 mb-5"><img src="https://i.postimg.cc/W4vLfYrm/LOGO-SKSE-utk-background-putih-(2).jpg" alt="Logo" className="h-24 w-auto mr-5" /><div className="flex-1 text-center pr-10"><h1 className="text-xl font-black uppercase tracking-wider">SEKOLAH KEBANGSAAN SIMPANG EMPAT</h1><h2 className="text-lg font-bold uppercase mt-1 text-gray-800">Laporan Harian Guru Bertugas</h2></div></div>

                                {/* Info Asas */}
                                <div className="flex justify-between items-center mb-4 text-sm font-bold bg-gray-100 p-2 border border-black"><span>TARIKH: {previewData.tarikh}</span><span className="uppercase">HARI: {['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'][new Date(previewData.tarikh).getDay()]}</span></div>

                                {previewData.cutiUmum ? (
                                    <div className="flex flex-col items-center justify-center py-32 border-4 border-dashed border-gray-300 mt-10 rounded-3xl">
                                        <Calendar className="w-24 h-24 text-gray-400 mb-6" />
                                        <h2 className="text-3xl font-black text-gray-700 tracking-widest uppercase mb-2">CUTI UMUM / SEKOLAH</h2>
                                        <p className="text-xl font-bold text-gray-500 uppercase text-center px-10">{previewData.namaCuti || 'Tiada Maklumat Cuti'}</p>
                                    </div>
                                ) : (
                                    <>
                                        {/* Maklumat Bertugas */}
                                        <table className="w-full border-collapse border border-black mb-5 text-sm">
                                            <tbody>
                                                <tr><td className="border border-black p-2 w-1/3 align-top bg-gray-50 font-bold">Pentadbir Bertugas</td><td className="border border-black p-2 w-2/3 uppercase">{previewData.pentadbir || '-'} <br/><span className="text-xs font-normal text-gray-600">({previewData.jawatanPentadbir || '-'})</span></td></tr>
                                                <tr><td className="border border-black p-2 align-top bg-gray-50 font-bold">Senarai Guru Bertugas</td><td className="border border-black p-2 uppercase"><ul className="list-disc ml-5 text-xs font-semibold">{previewData.guruBertugas.filter(Boolean).map((g, i) => <li key={i}>{g}</li>)}{previewData.guruBertugas.filter(Boolean).length === 0 && <li>- Tiada Rekod -</li>}</ul></td></tr>
                                            </tbody>
                                        </table>

                                        {/* Kehadiran Guru & Staf */}
                                        <table className="w-full border-collapse border border-black mb-5 text-sm text-center">
                                            <thead><tr className="bg-gray-200"><th className="border border-black p-1.5" colSpan="4">KEHADIRAN GURU & STAF</th></tr><tr className="bg-gray-50"><th className="border border-black p-1">Kategori</th><th className="border border-black p-1 w-16">Hadir</th><th className="border border-black p-1 w-16">TH</th><th className="border border-black p-1 text-left pl-2">Sebab / Catatan</th></tr></thead>
                                            <tbody>
                                                <tr><td className="border border-black p-1.5 font-bold">Guru</td><td className="border border-black p-1.5">{previewData.kehadiranGuru?.hadir || '-'}</td><td className="border border-black p-1.5">{previewData.kehadiranGuru?.tidakHadir || '-'}</td><td className="border border-black p-1.5 text-left text-xs uppercase">{previewData.kehadiranGuru?.sebab || '-'}</td></tr>
                                                <tr><td className="border border-black p-1.5 font-bold">Staf Sokongan</td><td className="border border-black p-1.5">{previewData.kehadiranStaf?.hadir || '-'}</td><td className="border border-black p-1.5">{previewData.kehadiranStaf?.tidakHadir || '-'}</td><td className="border border-black p-1.5 text-left text-xs uppercase">{previewData.kehadiranStaf?.sebab || '-'}</td></tr>
                                            </tbody>
                                        </table>

                                        {/* Laporan Perhimpunan */}
                                        <table className="w-full border-collapse border border-black mb-5 text-sm">
                                            <thead><tr className="bg-gray-200"><th className="border border-black p-1.5 text-left">LAPORAN PERHIMPUNAN</th></tr></thead>
                                            <tbody>
                                                <tr><td className="border border-black p-2 uppercase text-xs whitespace-pre-line">{previewData.rumusanPerhimpunan || '- Tiada Catatan -'}</td></tr>
                                            </tbody>
                                        </table>

                                        {/* Jadual Keselamatan */}
                                        <table className="w-full border-collapse border border-black mb-5 text-sm">
                                            <thead>
                                                <tr className="bg-gray-200"><th className="border border-black p-1.5 text-left" colSpan="3">LAPORAN KESELAMATAN</th></tr>
                                                <tr className="bg-gray-50 text-xs text-center"><th className="border border-black p-1 text-left">Komponen</th><th className="border border-black p-1 w-24">Terkawal</th><th className="border border-black p-1 w-28">Tidak Terkawal</th></tr>
                                            </thead>
                                            <tbody className="text-xs">
                                                {Object.entries(KOMPONEN_KESELAMATAN).map(([k, label], i) => {
                                                    const val = typeof previewData.keselamatan?.[k] === 'object' && previewData.keselamatan?.[k] !== null ? previewData.keselamatan[k].status : previewData.keselamatan?.[k];
                                                    return (
                                                        <tr key={k}><td className="border border-black p-1">{i + 1}. {label}</td><td className="border border-black p-1 text-center font-black text-green-700 text-sm">{(val === 'Terkawal' || val === 'Selamat') ? '✓' : ''}</td><td className="border border-black p-1 text-center font-black text-red-700 text-sm">{(val === 'Tidak Terkawal' || val === 'Tidak Selamat' || val === 'Sederhana') ? '✓' : ''}</td></tr>
                                                    );
                                                })}
                                                <tr><td className="border border-black p-1.5" colSpan="3"><strong>Catatan Tambahan:</strong> <span className="uppercase">{previewData.keselamatan?.catatan || '-'}</span></td></tr>
                                            </tbody>
                                        </table>

                                        {/* Jadual Persekitaran */}
                                        <table className="w-full border-collapse border border-black mb-5 text-sm">
                                            <thead>
                                                <tr className="bg-gray-200"><th className="border border-black p-1.5 text-left" colSpan="3">PERSEKITARAN SEKOLAH</th></tr>
                                                <tr className="bg-gray-50 text-xs text-center"><th className="border border-black p-1 text-left">Komponen</th><th className="border border-black p-1 w-24">Memuaskan</th><th className="border border-black p-1 w-28">Tidak Memuaskan</th></tr>
                                            </thead>
                                            <tbody className="text-xs">
                                                {Object.entries(KOMPONEN_PERSEKITARAN).map(([k, label], i) => (
                                                    <tr key={k}><td className="border border-black p-1">{i + 1}. {label}</td><td className="border border-black p-1 text-center font-black text-green-700 text-sm">{previewData.persekitaran?.[k] === 'Memuaskan' ? '✓' : ''}</td><td className="border border-black p-1 text-center font-black text-red-700 text-sm">{previewData.persekitaran?.[k] === 'Tidak Memuaskan' ? '✓' : ''}</td></tr>
                                                ))}
                                                <tr><td className="border border-black p-1.5" colSpan="3"><strong>Catatan Tambahan:</strong> <span className="uppercase">{previewData.persekitaran?.catatan || '-'}</span></td></tr>
                                            </tbody>
                                        </table>

                                        {/* --- PEMISAH MUKA SURAT CETAKAN (PAGE BREAK) --- */}
                                        <div className="page-break w-full border-t border-dashed border-gray-300 print:border-none py-2 print:py-0 text-center print-hidden text-xs text-gray-400 font-bold tracking-widest">
                                            &#9982; MUKA SURAT 2 &#9982;
                                        </div>

                                        {/* Isu Disiplin & Murid Keluar */}
                                        <div className="grid grid-cols-2 gap-4 mb-5 text-xs avoid-break">
                                            <div className="border border-black"><div className="bg-gray-200 font-bold p-1 border-b border-black text-center">ISU DISIPLIN MURID</div><div className="p-2 min-h-[60px]">{!previewData.isuDisiplin || previewData.isuDisiplin.length === 0 ? (<p className="text-center italic mt-2">- Tiada Kes -</p>) : (<ol className="list-decimal ml-4 uppercase space-y-2">{previewData.isuDisiplin.map((isu, idx) => (<li key={idx}><div className="font-bold">{isu.nama || 'TIADA NAMA'} <span className="font-normal text-[10px]">({isu.kelas || 'N/A'})</span></div><div className="text-[10px] text-gray-700 mt-0.5 border-t border-dashed border-gray-300 pt-0.5"><span className="font-semibold">Isu:</span> {isu.isu || '-'}</div></li>))}</ol>)}</div></div>
                                            <div className="border border-black"><div className="bg-gray-200 font-bold p-1 border-b border-black text-center">MURID KELUAR AWAL</div><div className="p-2 min-h-[60px]">{!previewData.muridKeluar || previewData.muridKeluar.length === 0 ? (<p className="text-center italic mt-2">- Tiada Rekod -</p>) : (<ol className="list-decimal ml-4 uppercase space-y-2">{previewData.muridKeluar.map((m, idx) => (<li key={idx}><div className="font-bold">{m.nama || 'TIADA NAMA'} <span className="font-normal text-[10px]">({m.kelas || 'N/A'})</span></div><div className="text-[10px] text-gray-700 mt-0.5 border-t border-dashed border-gray-300 pt-0.5"><span className="font-semibold">Sebab:</span> {m.sebab || '-'}</div></li>))}</ol>)}</div></div>
                                        </div>

                                        {/* Rekod Pelawat */}
                                        <div className="border border-black mb-5 text-sm avoid-break"><div className="bg-gray-200 font-bold p-1.5 border-b border-black text-xs">REKOD PELAWAT</div><div className="p-2 min-h-[50px] text-xs">{!previewData.pelawat || previewData.pelawat.length === 0 ? (<p className="text-center italic mt-1">- Tiada Pelawat Direkodkan -</p>) : (<table className="w-full text-left border-collapse"><thead><tr className="border-b border-gray-400"><th className="pb-1 w-1/3 pl-1">Nama</th><th className="pb-1 w-1/3">Agensi</th><th className="pb-1 w-1/3">Tujuan</th></tr></thead><tbody>{previewData.pelawat.map((p, idx) => (<tr key={idx} className="uppercase border-b border-gray-200 last:border-0"><td className="py-1.5 pr-2 pl-1 font-semibold">{p.nama || '-'}</td><td className="py-1.5 pr-2">{p.agensi || '-'}</td><td className="py-1.5">{p.tujuan || '-'}</td></tr>))}</tbody></table>)}</div></div>

                                        {/* Aktiviti / Program */}
                                        <div className="border border-black mb-8 text-sm avoid-break"><div className="bg-gray-200 font-bold p-1.5 border-b border-black">AKTIVITI / PROGRAM / TINDAKAN GURU BERTUGAS</div><div className="p-3 min-h-[80px] text-xs uppercase whitespace-pre-line">{previewData.tindakan || '- Tiada catatan -'}</div></div>
                                    </>
                                )}

                                {/* Ruangan Tandatangan */}
                                {!previewData.cutiUmum && (
                                    <div className="flex justify-between mt-12 px-10 text-center text-sm avoid-break">
                                        <div><p className="mb-14 text-xs font-bold">Disediakan Oleh,</p><p className="font-bold border-b border-black inline-block px-4 pb-1 uppercase">{previewData.pelapor || '...........................................'}</p><p className="text-xs mt-1">Guru Bertugas</p></div>
                                        <div><p className="mb-14 text-xs font-bold">Disahkan Oleh,</p><p className="font-bold border-b border-black inline-block px-4 pb-1 uppercase">{previewData.pentadbir || '...........................................'}</p><p className="text-xs mt-1 uppercase">{previewData.jawatanPentadbir || 'Pihak Pentadbir'}</p></div>
                                    </div>
                                )}

                                {previewData.disahkanAdmin && !previewData.cutiUmum && (<div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 opacity-10 pointer-events-none select-none text-[8rem] font-black text-green-600 border-8 border-green-600 rounded-3xl p-4 rotate-[-30deg]">DISAHKAN</div>)}
                            </div>
                        </div>
                    )}

                    {/* MAIN APPLICATION */}
                    <div className={showHarianPreview ? 'hidden print:hidden' : 'bg-gradient-to-br from-indigo-100 via-purple-100 to-pink-100 pb-10'}>
                        
                        {printMode && !isAdmin && !showHarianPreview && (
                            <div className="fixed bottom-0 left-0 right-0 bg-gray-900 text-white p-4 flex flex-col sm:flex-row justify-between items-center z-[150] print-hidden shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-4 border-yellow-400">
                                <div className="mb-3 sm:mb-0 text-center sm:text-left"><p className="font-bold text-lg text-yellow-400 flex items-center justify-center sm:justify-start"><Printer className="w-5 h-5 mr-2 animate-pulse" /> MOD CETAKAN {activeTab.toUpperCase()}</p><p className="text-xs text-gray-300">Sila semak maklumat laporan di bawah sebelum menekan butang Cetak.</p></div>
                                <div className="flex space-x-3"><button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-xl font-bold flex items-center shadow-lg transition-transform hover:scale-105">Cetak Sekarang</button><button onClick={() => { setPrintMode(false); setIsAdmin(true); }} className="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-xl font-bold flex items-center transition-colors"><X className="w-5 h-5 mr-2" /> Batal</button></div>
                            </div>
                        )}

                        {toast.show && (<div className="fixed bottom-20 sm:bottom-5 right-5 bg-purple-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center animate-bounce z-[200] print-hidden"><CheckCircle className="mr-2 text-green-400"/> {toast.message}</div>)}
                        {loading && (<div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[60] print-hidden"><div className="bg-white p-4 rounded-lg shadow-xl flex items-center"><Activity className="animate-spin mr-2 text-blue-600" /> Memproses...</div></div>)}

                        {showAdminLogin && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] print-hidden">
                                <div className="bg-white p-6 rounded-3xl shadow-2xl w-96 transform transition-all animate-fade-in-up border-4 border-gray-800">
                                    <div className="flex justify-between items-center mb-6"><h3 className="text-xl font-bold flex items-center text-gray-800"><Key className="w-5 h-5 mr-2 text-purple-600"/> Admin</h3><button onClick={() => {setShowAdminLogin(false); setAdminPwdInput('');}}><X className="w-5 h-5 text-gray-400 hover:text-red-500"/></button></div>
                                    <div className="mb-4"><input type="password" placeholder="Kata Laluan" className="w-full p-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-purple-500 outline-none font-bold tracking-widest text-center" value={adminPwdInput} onChange={(e) => setAdminPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAdminLogin()} /></div>
                                    <button onClick={handleAdminLogin} className="w-full bg-gray-800 text-white font-bold py-3 rounded-xl hover:bg-gray-900 transition-colors shadow-lg flex justify-center items-center"><Shield className="w-5 h-5 mr-2"/> Log Masuk</button>
                                </div>
                            </div>
                        )}

                        <nav className={`bg-gradient-to-r ${isAdmin ? 'from-gray-800 via-gray-700 to-gray-900' : 'from-violet-600 via-fuchsia-500 to-pink-500'} text-white shadow-lg sticky top-0 z-50 pb-4 pt-4 px-4 rounded-b-[2.5rem] mb-6 print-hidden transition-all duration-500`}>
                            <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center">
                                <div className="flex items-center space-x-3 mb-4 md:mb-0">
                                    <div className="bg-white p-2 rounded-2xl shadow-inner"><img src="https://i.postimg.cc/W4vLfYrm/LOGO-SKSE-utk-background-putih-(2).jpg" alt="Logo SKSE" className="h-10 w-auto object-contain"/></div>
                                    <div><h1 className="text-xl font-black tracking-tight">SK SIMPANG EMPAT</h1><p className={`text-xs ${isAdmin ? 'text-yellow-400' : 'text-pink-100'} font-medium tracking-widest uppercase`}>{isAdmin ? 'Panel Pentadbir' : 'Sistem Guru Bertugas'}</p></div>
                                </div>

                                                let perTotal = 0, perGood = 0;

                                                    const dayData = dataMingguan[hari];

                                                        if (Array.isArray(dayData.isuDisiplin)) {
                                                            dayData.isuDisiplin.forEach(isu => {

                                                                    if (dayData.persekitaran[k] === 'Memuaskan') perGood++;
                                                                }

                                                            }
                                                        }

                                                const perPct = perTotal > 0 ? Math.round((perGood / perTotal) * 100) : 0;

                                                    return { l: `Gred D (${pct}%)`, c: 'bg-red-100 text-red-700' };

                                                                                        <span className="font-bold text-gray-700 uppercase">Keterangan:</span> {isu.isu || '-'}
